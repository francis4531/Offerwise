[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",   # line too long (handled by formatter)
    "E402",   # module level import not at top (Flask pattern)
    "F841",   # local variable assigned but never used (common in try/except)
]

[tool.ruff.lint.per-file-ignores]
"scripts_archive/*" = ["ALL"]
"test_*.py" = ["F841"]

[tool.pytest.ini_options]
testpaths = ["."]
python_files = "test_*.py"
python_functions = "test_*"
addopts = "-v --tb=short"
