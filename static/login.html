<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — OfferWise</title>
  <link rel="icon" type="image/svg+xml" href="/logo-icon-only.svg">
  <link rel="stylesheet" href="/static/ow-system.css">
  <style>
    body {
      background: var(--bg-void);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      position: relative;
      overflow: hidden;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 30% 20%, rgba(59,130,246,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(139,92,246,0.06) 0%, transparent 60%);
    }

    /* Back link */
    .back-link {
      position: absolute;
      top: var(--space-6);
      left: var(--space-6);
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text-secondary); }

    /* Card */
    .auth-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-2xl);
      padding: var(--space-8) var(--space-8);
      box-shadow: var(--shadow-lg), 0 0 60px rgba(59,130,246,0.06);
      animation: fadeUp 0.5s var(--ease-out) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .auth-logo {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    .auth-logo__mark {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-style: normal;
      font-weight: 800;
      font-size: var(--text-3xl);
      background: linear-gradient(90deg, #f97316 0%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: block;
      margin-bottom: var(--space-1);
    }
    .auth-logo__sub {
      font-size: var(--text-sm);
      color: var(--text-muted);
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: var(--bg-elevated);
      border-radius: var(--radius-lg);
      padding: 3px;
      margin-bottom: var(--space-6);
      gap: 2px;
    }
    .auth-tab {
      flex: 1;
      padding: 0.625rem;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .auth-tab:hover:not(.active) { color: var(--text-secondary); }
    .auth-tab.active {
      background: var(--bg-overlay);
      color: var(--text-primary);
    }

    /* Messages */
    .form-msg {
      display: none;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      margin-bottom: var(--space-4);
    }
    .form-msg.error {
      background: var(--red-dim);
      border: 1px solid rgba(239,68,68,0.25);
      color: #FCA5A5;
    }
    .form-msg.success {
      background: var(--green-dim);
      border: 1px solid rgba(16,185,129,0.25);
      color: #4ADE80;
    }

    /* Forms */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-group { margin-bottom: var(--space-4); }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-2);
    }
    .form-row .form-label { margin-bottom: 0; }
    .form-row a {
      font-size: var(--text-xs);
      color: var(--blue-bright);
      text-decoration: none;
      font-weight: 500;
    }
    .form-row a:hover { text-decoration: underline; }

    .pw-hint {
      font-size: var(--text-xs);
      color: var(--text-ghost);
      margin-top: var(--space-2);
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s var(--ease-out), box-shadow 0.15s;
      margin-bottom: var(--space-5);
    }
    .submit-btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(59,130,246,0.35);
    }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Divider */
    .or-divider {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
      color: var(--text-ghost);
      font-size: var(--text-xs);
    }
    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-dim);
    }

    /* OAuth */
    .oauth-grid { display: flex; flex-direction: column; gap: var(--space-3); }

    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      padding: 0.75rem;
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s var(--ease-out), box-shadow 0.15s, border-color 0.15s;
      border: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
      color: var(--text-primary);
    }
    .oauth-btn:hover {
      border-color: var(--border-active);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .oauth-btn.google {
      background: #fff;
      color: #1f2937;
      border-color: #e5e7eb;
    }
    .oauth-btn.google:hover { border-color: var(--blue); }
    .oauth-btn.facebook {
      background: #1877F2;
      color: #fff;
      border-color: #1877F2;
    }
    .oauth-btn.facebook:hover { background: #166FE5; }
    .oauth-icon { width: 20px; height: 20px; flex-shrink: 0; }
  </style>
</head>
<body>
  <a href="/" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Home
  </a>

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <span class="auth-logo__mark"><span style="-webkit-text-fill-color:#f1f5f9;color:#f1f5f9;">Offer</span>Wise AI</span>
      <span class="auth-logo__sub">Smart offer pricing for home buyers</span>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('signin')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Messages -->
    <div id="formError" class="form-msg error"></div>
    <div id="formSuccess" class="form-msg success"></div>

    <!-- Sign In -->
    <div id="signinForm" class="auth-form active">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <div class="form-row">
          <label class="form-label" for="loginPassword">Password</label>
          <a href="#" onclick="switchTab('forgot'); return false;">Forgot password?</a>
        </div>
        <input class="form-input" type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button class="submit-btn" onclick="handleLogin()" id="loginBtn">Sign In</button>
    </div>

    <!-- Sign Up -->
    <div id="signupForm" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="signupName">Name</label>
        <input class="form-input" type="text" id="signupName" placeholder="Your name" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="signupEmail">Email</label>
        <input class="form-input" type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="signupPassword">Password</label>
        <input class="form-input" type="password" id="signupPassword" placeholder="Create a password" autocomplete="new-password">
        <div class="pw-hint">At least 8 characters</div>
      </div>
      <button class="submit-btn" onclick="handleSignup()" id="signupBtn">Create Account</button>
    </div>

    <!-- Forgot Password -->
    <div id="forgotForm" class="auth-form">
      <p style="font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--space-5);line-height:1.6">Enter your email and we'll send you a link to reset your password.</p>
      <div class="form-group">
        <label class="form-label" for="forgotEmail">Email</label>
        <input class="form-input" type="email" id="forgotEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <button class="submit-btn" onclick="handleForgot()" id="forgotBtn">Send Reset Link</button>
      <div style="text-align:center">
        <a href="#" onclick="switchTab('signin'); return false;" style="font-size:var(--text-sm);color:var(--blue-bright);text-decoration:none;font-weight:500">← Back to sign in</a>
      </div>
    </div>

    <!-- OAuth -->
    <div class="or-divider">or continue with</div>
    <div class="oauth-grid">
      <a href="/login/google" class="oauth-btn google">
        <svg class="oauth-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </a>
      <a href="/login/facebook" class="oauth-btn facebook">
        <svg class="oauth-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        Continue with Facebook
      </a>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('formError').style.display = 'none';
      document.getElementById('formSuccess').style.display = 'none';
      if (tab === 'signin') {
        document.getElementById('signinForm').classList.add('active');
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
      } else if (tab === 'signup') {
        document.getElementById('signupForm').classList.add('active');
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
      } else if (tab === 'forgot') {
        document.getElementById('forgotForm').classList.add('active');
      }
    }
    function showError(msg) {
      const el = document.getElementById('formError');
      el.textContent = msg; el.style.display = 'block';
      document.getElementById('formSuccess').style.display = 'none';
    }
    function showSuccess(msg) {
      const el = document.getElementById('formSuccess');
      el.textContent = msg; el.style.display = 'block';
      document.getElementById('formError').style.display = 'none';
    }
    async function handleLogin() {
      const btn = document.getElementById('loginBtn');
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) { showError('Please enter both email and password.'); return; }
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const res = await fetch('/auth/login-email', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
        const data = await res.json();
        if (data.success) { window.location.href = data.redirect || '/settings?tab=analyses'; }
        else { showError(data.error || 'Login failed. Please try again.'); }
      } catch { showError('Something went wrong. Please try again.'); }
      finally { btn.disabled = false; btn.textContent = 'Sign In'; }
    }
    async function handleSignup() {
      const btn = document.getElementById('signupBtn');
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
      if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
      btn.disabled = true; btn.textContent = 'Creating account…';
      try {
        const res = await fetch('/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,email,password}) });
        const data = await res.json();
        if (data.success) { window.location.href = data.redirect || '/settings?tab=analyses'; }
        else { showError(data.error || 'Registration failed. Please try again.'); }
      } catch { showError('Something went wrong. Please try again.'); }
      finally { btn.disabled = false; btn.textContent = 'Create Account'; }
    }
    async function handleForgot() {
      const btn = document.getElementById('forgotBtn');
      const email = document.getElementById('forgotEmail').value.trim();
      if (!email) { showError('Please enter your email address.'); return; }
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const res = await fetch('/auth/forgot-password', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email}) });
        const data = await res.json();
        if (data.success) { showSuccess(data.message); }
        else { showError(data.error || 'Something went wrong.'); }
      } catch { showError('Something went wrong. Please try again.'); }
      finally { btn.disabled = false; btn.textContent = 'Send Reset Link'; }
    }
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('signinForm').classList.contains('active')) handleLogin();
      else if (document.getElementById('signupForm').classList.contains('active')) handleSignup();
      else if (document.getElementById('forgotForm').classList.contains('active')) handleForgot();
    });
    if (window.location.search.includes('signup')) switchTab('signup');
  </script>
  <script src="/static/js/compliance.js"></script>
</body>
</html>
