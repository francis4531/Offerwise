<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - OfferWise AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --text-display-l: 2rem;
            --text-body: 1rem;
            --text-body-sm: 0.875rem;
            --text-caption-lg: 0.8125rem;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 440px;
            width: 100%;
            padding: 48px 40px;
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 {
            font-size: var(--text-display-l);
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .logo p { color: #94a3b8; font-size: var(--text-body); line-height: 1.5; }
        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .auth-tab {
            flex: 1; padding: 12px; text-align: center;
            font-size: var(--text-body-sm); font-weight: 600;
            color: #94a3b8; background: transparent;
            border: none; border-radius: 10px;
            cursor: pointer; transition: all 0.2s;
        }
        .auth-tab.active { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .auth-tab:hover:not(.active) { color: #cbd5e1; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; color: #cbd5e1;
            font-size: var(--text-caption-lg); font-weight: 600; margin-bottom: 6px;
        }
        .form-group input {
            width: 100%; padding: 14px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; color: #e2e8f0;
            font-size: var(--text-body); outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: rgba(59, 130, 246, 0.5); }
        .form-group input::placeholder { color: #64748b; }
        .submit-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white; border: none; border-radius: 12px;
            font-size: var(--text-body); font-weight: 700;
            cursor: pointer; transition: all 0.3s; margin-top: 8px;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .forgot-link { text-align: right; margin-bottom: 16px; }
        .forgot-link a { color: #60a5fa; font-size: var(--text-caption-lg); text-decoration: none; }
        .forgot-link a:hover { text-decoration: underline; }
        .form-error {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5; padding: 12px 16px; border-radius: 10px;
            font-size: var(--text-caption-lg); margin-bottom: 16px; display: none;
        }
        .form-success {
            background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac; padding: 12px 16px; border-radius: 10px;
            font-size: var(--text-caption-lg); margin-bottom: 16px; display: none;
        }
        .divider { display: flex; align-items: center; margin: 24px 0; gap: 16px; }
        .divider-line { flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1); }
        .divider-text { color: #64748b; font-size: var(--text-caption-lg); white-space: nowrap; }
        .oauth-buttons { display: flex; flex-direction: column; gap: 12px; }
        .oauth-btn {
            width: 100%; padding: 14px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; font-size: var(--text-body-sm); font-weight: 600;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            text-decoration: none; color: #e2e8f0;
        }
        .oauth-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(59, 130, 246, 0.5); transform: translateY(-2px); }
        .oauth-btn.google { background: white; color: #1f2937; border-color: #e5e7eb; }
        .oauth-btn.google:hover { border-color: #3b82f6; }
        .oauth-btn.facebook { background: #1877f2; color: white; border-color: #1877f2; }
        .oauth-btn.facebook:hover { background: #166fe5; }
        .oauth-icon { width: 20px; height: 20px; }
        .back-link { text-align: center; margin-top: 28px; }
        .back-link a { color: #60a5fa; text-decoration: none; font-weight: 600; font-size: var(--text-body-sm); }
        .back-link a:hover { color: #93c5fd; text-decoration: underline; }
        .password-requirements { color: #64748b; font-size: 0.75rem; margin-top: 4px; }
        @media (max-width: 480px) {
            .login-container { padding: 32px 24px; }
            .logo h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>OfferWise AI</h1>
            <p>Smart offer pricing for home buyers</p>
        </div>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('signin')">Sign In</button>
            <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
        </div>
        <div id="formError" class="form-error"></div>
        <div id="formSuccess" class="form-success"></div>

        <!-- SIGN IN -->
        <div id="signinForm" class="auth-form active">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
            </div>
            <div class="forgot-link">
                <a href="#" onclick="switchTab('forgot'); return false;">Forgot password?</a>
            </div>
            <button class="submit-btn" onclick="handleLogin()" id="loginBtn">Sign In</button>
        </div>

        <!-- SIGN UP -->
        <div id="signupForm" class="auth-form">
            <div class="form-group">
                <label for="signupName">Name</label>
                <input type="text" id="signupName" placeholder="Your name" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password" autocomplete="new-password">
                <div class="password-requirements">At least 8 characters</div>
            </div>
            <button class="submit-btn" onclick="handleSignup()" id="signupBtn">Create Account</button>
        </div>

        <!-- FORGOT PASSWORD -->
        <div id="forgotForm" class="auth-form">
            <p style="color: #94a3b8; font-size: 0.875rem; margin-bottom: 20px; line-height: 1.5;">
                Enter your email and we will send you a link to reset your password.
            </p>
            <div class="form-group">
                <label for="forgotEmail">Email</label>
                <input type="email" id="forgotEmail" placeholder="you@example.com" autocomplete="email">
            </div>
            <button class="submit-btn" onclick="handleForgot()" id="forgotBtn">Send Reset Link</button>
            <div style="text-align: center; margin-top: 16px;">
                <a href="#" onclick="switchTab('signin'); return false;" style="color: #60a5fa; font-size: 0.8125rem; text-decoration: none;">Back to sign in</a>
            </div>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">or continue with</span>
            <div class="divider-line"></div>
        </div>

        <div class="oauth-buttons">
            <a href="/login/google" class="oauth-btn google">
                <svg class="oauth-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Google
            </a>
            <a href="/login/facebook" class="oauth-btn facebook">
                <svg class="oauth-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                Facebook
            </a>
        </div>
        <div class="back-link">
            <a href="/">&larr; Back to home</a>
        </div>
    </div>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.auth-form').forEach(function(f) { f.classList.remove('active'); });
            document.querySelectorAll('.auth-tab').forEach(function(t) { t.classList.remove('active'); });
            document.getElementById('formError').style.display = 'none';
            document.getElementById('formSuccess').style.display = 'none';
            if (tab === 'signin') {
                document.getElementById('signinForm').classList.add('active');
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
            } else if (tab === 'signup') {
                document.getElementById('signupForm').classList.add('active');
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
            } else if (tab === 'forgot') {
                document.getElementById('forgotForm').classList.add('active');
            }
        }
        function showError(msg) {
            var el = document.getElementById('formError');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('formSuccess').style.display = 'none';
        }
        function showSuccess(msg) {
            var el = document.getElementById('formSuccess');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('formError').style.display = 'none';
        }
        async function handleLogin() {
            var btn = document.getElementById('loginBtn');
            var email = document.getElementById('loginEmail').value.trim();
            var password = document.getElementById('loginPassword').value;
            if (!email || !password) { showError('Please enter both email and password.'); return; }
            btn.disabled = true; btn.textContent = 'Signing in...';
            try {
                var res = await fetch('/auth/login-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });
                var data = await res.json();
                if (data.success) {
                    window.location.href = data.redirect || '/settings?tab=analyses';
                } else {
                    showError(data.error || 'Login failed. Please try again.');
                }
            } catch (err) {
                showError('Something went wrong. Please try again.');
            } finally {
                btn.disabled = false; btn.textContent = 'Sign In';
            }
        }
        async function handleSignup() {
            var btn = document.getElementById('signupBtn');
            var name = document.getElementById('signupName').value.trim();
            var email = document.getElementById('signupEmail').value.trim();
            var password = document.getElementById('signupPassword').value;
            if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
            if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
            btn.disabled = true; btn.textContent = 'Creating account...';
            try {
                var res = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, email: email, password: password })
                });
                var data = await res.json();
                if (data.success) {
                    window.location.href = data.redirect || '/settings?tab=analyses';
                } else {
                    showError(data.error || 'Registration failed. Please try again.');
                }
            } catch (err) {
                showError('Something went wrong. Please try again.');
            } finally {
                btn.disabled = false; btn.textContent = 'Create Account';
            }
        }
        async function handleForgot() {
            var btn = document.getElementById('forgotBtn');
            var email = document.getElementById('forgotEmail').value.trim();
            if (!email) { showError('Please enter your email address.'); return; }
            btn.disabled = true; btn.textContent = 'Sending...';
            try {
                var res = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                var data = await res.json();
                if (data.success) { showSuccess(data.message); }
                else { showError(data.error || 'Something went wrong.'); }
            } catch (err) {
                showError('Something went wrong. Please try again.');
            } finally {
                btn.disabled = false; btn.textContent = 'Send Reset Link';
            }
        }
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('signinForm').classList.contains('active')) handleLogin();
                else if (document.getElementById('signupForm').classList.contains('active')) handleSignup();
                else if (document.getElementById('forgotForm').classList.contains('active')) handleForgot();
            }
        });
        if (window.location.search.indexOf('signup') > -1) switchTab('signup');
    </script>
<script src="/static/js/compliance.js"></script>
</body>
</html>
