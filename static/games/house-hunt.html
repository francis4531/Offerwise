<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:       #09090f;
  --surface:  #111118;
  --surface2: #17171f;
  --surface3: #1e1e28;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --text:     #f0f0f8;
  --text2:    #7878a0;
  --text3:    #3d3d58;
  --accent:   #7c6aff;
  --green:    #4ade80;
  --amber:    #fbbf24;
  --red:      #f87171;
  --blue:     #60a5fa;
  --purple:   #c084fc;
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ──────────────────────────────────────────────────── */
.top-bar {
  background: rgba(9,9,15,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.top-bar-logo {
  font-size: 0.875rem; font-weight: 700;
  background: linear-gradient(135deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-decoration: none;
}
.top-bar-right {
  display: flex; align-items: center; gap: 16px;
}
.top-bar-right a {
  font-size: 0.8125rem; font-weight: 600; color: var(--text2);
  text-decoration: none; transition: color 0.15s;
}
.top-bar-right a:hover { color: var(--text); }
.top-bar-right .cta {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white; padding: 7px 16px; border-radius: 7px;
}
.top-bar-right .cta:hover { color: white; }

/* ── LAYOUT ───────────────────────────────────────────────── */
.game-wrap {
  max-width: 720px; margin: 0 auto;
  padding: 28px 16px 60px;
}

/* ── GAME HEADER ──────────────────────────────────────────── */
.game-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.game-title-block {}
.game-title {
  font-size: 0.6875rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--accent); margin-bottom: 3px;
}
.game-subtitle {
  font-size: 0.8125rem; color: var(--text2);
}

.hud {
  display: flex; gap: 12px;
}
.hud-stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px; text-align: center; min-width: 72px;
}
.hud-val {
  font-size: 1rem; font-weight: 800; letter-spacing: -0.02em;
  line-height: 1.1; margin-bottom: 2px;
}
.hud-lbl {
  font-size: 0.625rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text2);
}
.hud-val.good   { color: var(--green); }
.hud-val.warn   { color: var(--amber); }
.hud-val.bad    { color: var(--red); }
.hud-val.normal { color: var(--text); }

/* ── PHASE TRACK ──────────────────────────────────────────── */
.phase-track {
  display: flex; margin-bottom: 20px;
}
.phase-pip {
  flex: 1; text-align: center;
  font-size: 0.5625rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.09em; padding: 7px 4px 6px;
  color: var(--text3); border-bottom: 2px solid var(--text3);
  transition: all 0.3s;
}
.phase-pip.done   { color: var(--green); border-color: var(--green); }
.phase-pip.active { color: var(--accent); border-color: var(--accent); }

/* ── MAIN CARD ────────────────────────────────────────────── */
.scene-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 16px;
}

.scene-head {
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 14px; align-items: flex-start;
}
.scene-icon-box {
  width: 50px; height: 50px; border-radius: 12px; flex-shrink: 0;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.625rem;
}
.scene-meta {}
.scene-phase-lbl {
  font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.13em; color: var(--accent); margin-bottom: 4px;
}
.scene-title {
  font-size: 1.125rem; font-weight: 700; letter-spacing: -0.02em;
  line-height: 1.25; margin-bottom: 3px;
}
.scene-sub {
  font-size: 0.8125rem; color: var(--text2);
}

.scene-body { padding: 20px 22px; }

/* ── SPEECH BUBBLE ────────────────────────────────────────── */
.speech {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 14px;
}
.speech-who {
  display: flex; align-items: center; gap: 7px;
  font-size: 0.6875rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.09em; color: var(--text2); margin-bottom: 9px;
}
.speech-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.speech-text {
  font-size: 0.9375rem; line-height: 1.68; color: var(--text);
  font-style: italic;
}

/* ── ALERTS ───────────────────────────────────────────────── */
.alert {
  display: flex; gap: 9px; align-items: flex-start;
  padding: 11px 13px; border-radius: 8px; margin-bottom: 10px;
  font-size: 0.8125rem; line-height: 1.5;
}
.alert-warn { background:rgba(251,191,36,.07); border:1px solid rgba(251,191,36,.2); color:#fde68a; }
.alert-bad  { background:rgba(248,113,113,.07); border:1px solid rgba(248,113,113,.2); color:#fca5a5; }
.alert-good { background:rgba(74,222,128,.07); border:1px solid rgba(74,222,128,.2); color:#86efac; }
.alert-info { background:rgba(96,165,250,.07); border:1px solid rgba(96,165,250,.2); color:#93c5fd; }

/* ── CHOICES ──────────────────────────────────────────────── */
.choices { display:flex; flex-direction:column; gap:8px; margin-top:6px; }

.choice {
  width:100%; text-align:left;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 11px; padding: 14px 15px;
  cursor: pointer; transition: all 0.16s;
  display: flex; align-items: flex-start; gap: 11px;
}
.choice:hover {
  border-color: var(--accent);
  background: rgba(124,106,255,0.06);
  transform: translateX(3px);
}
.choice:active { transform: translateX(1px) scale(0.99); }
.choice.selected { border-color: var(--accent); background: rgba(124,106,255,0.08); }
.choice.dim { opacity: 0.35; pointer-events: none; }

.choice-key {
  width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6875rem; font-weight: 700; color: var(--text2); margin-top: 2px;
}
.choice-body { flex: 1; }
.choice-label {
  font-size: 0.9375rem; font-weight: 600; color: var(--text); margin-bottom: 2px;
}
.choice-desc { font-size: 0.8125rem; color: var(--text2); line-height: 1.45; }

.choice-tag {
  flex-shrink: 0; align-self: center; margin-left: 4px;
  font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; padding: 3px 9px; border-radius: 100px;
}
.tag-bold   { background:rgba(124,106,255,.15); color:var(--accent); }
.tag-safe   { background:rgba(74,222,128,.12); color:var(--green); }
.tag-risk   { background:rgba(248,113,113,.12); color:var(--red); }
.tag-money  { background:rgba(251,191,36,.12); color:var(--amber); }

/* ── OUTCOME ──────────────────────────────────────────────── */
.outcome-box {
  display: none; margin-top: 14px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px;
  animation: popIn 0.25s ease;
}
.outcome-box.show { display: block; }
@keyframes popIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.outcome-head {
  display: flex; align-items: center; gap: 9px;
  font-size: 1rem; font-weight: 700; margin-bottom: 9px;
}
.outcome-delta {
  margin-left: auto; font-size: 0.8125rem; font-weight: 700;
}
.outcome-text {
  font-size: 0.875rem; color: var(--text2); line-height: 1.68; margin-bottom: 14px;
}
.next-btn {
  width: 100%; padding: 13px; border: none; border-radius: 10px;
  background: var(--accent); color: #fff;
  font-size: 0.9375rem; font-weight: 700; cursor: pointer;
  transition: opacity .15s, transform .15s; font-family: inherit;
}
.next-btn:hover { opacity: .9; transform: translateY(-1px); }

/* ── SCORE FLASH ──────────────────────────────────────────── */
.flash {
  position: fixed; top: 45%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2.25rem; font-weight: 900;
  pointer-events: none; z-index: 999;
  animation: flashAnim 1.1s ease forwards;
}
@keyframes flashAnim {
  0%   { opacity:0; transform:translate(-50%,-60%) scale(.7); }
  20%  { opacity:1; transform:translate(-50%,-60%) scale(1.15); }
  70%  { opacity:1; transform:translate(-50%,-75%) scale(1); }
  100% { opacity:0; transform:translate(-50%,-90%) scale(.95); }
}

/* ── END SCREEN ───────────────────────────────────────────── */
.end-wrap {
  display: none; text-align: center;
  padding: 44px 28px;
}
.end-wrap.show { display: block; }

.end-emoji { font-size: 3.5rem; margin-bottom: 10px; }
.end-headline {
  font-size: 2rem; font-weight: 900; letter-spacing: -0.04em; margin-bottom: 6px;
}
.end-grade {
  font-size: 5.5rem; font-weight: 900; letter-spacing: -0.05em;
  line-height: 1; margin: 12px 0;
}
.end-caption {
  font-size: 0.9375rem; color: var(--text2);
  line-height: 1.7; max-width: 400px; margin: 0 auto 28px;
}
.end-stats {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 10px; margin-bottom: 28px;
}
.end-stat {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 11px; padding: 14px 8px;
}
.end-stat-val {
  font-size: 1.375rem; font-weight: 800; letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.end-stat-lbl {
  font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text2);
}

.play-again {
  background: var(--accent); color: #fff; border: none;
  border-radius: 10px; padding: 14px 36px;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: opacity .15s;
}
.play-again:hover { opacity: .9; }

/* ── OW NUDGE ─────────────────────────────────────────────── */
.ow-nudge {
  background: linear-gradient(135deg, rgba(124,106,255,.1), rgba(96,165,250,.07));
  border: 1px solid rgba(124,106,255,.25);
  border-radius: 12px; padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
  margin-top: 16px;
}
.ow-nudge-text {
  font-size: 0.8125rem; color: var(--text2); line-height: 1.55;
}
.ow-nudge-text strong { color: var(--text); }
.ow-nudge-cta {
  flex-shrink: 0;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: #fff; border: none; border-radius: 8px;
  padding: 8px 16px; font-size: 0.8125rem; font-weight: 700;
  cursor: pointer; font-family: inherit; text-decoration: none;
  white-space: nowrap;
}

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media (max-width: 560px) {
  .hud { gap: 8px; }
  .hud-stat { padding: 7px 10px; min-width: 60px; }
  .hud-val { font-size: 0.875rem; }
  .scene-head { padding: 16px 16px 14px; }
  .scene-body { padding: 16px; }
  .ow-nudge { flex-direction: column; text-align: center; }
  .end-stats { grid-template-columns: repeat(3,1fr); gap: 8px; }
  .end-grade { font-size: 4rem; }
}
</style>

// ══════════════════════════════════════════════════════════════
// COLOR TOKENS (strings, not CSS vars — used in JS)
// ══════════════════════════════════════════════════════════════
const var_green = '#4ade80';
const var_amber = '#fbbf24';
const var_red   = '#f87171';

// Fix forward-referenced color tokens in scenes
SCENES.forEach(s => s.choices.forEach(c => {
  const o = c.out;
  if (o.color === 'var_green') o.color = var_green;
  if (o.color === 'var_amber') o.color = var_amber;
  if (o.color === 'var_red')   o.color = var_red;
}));

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
const PHASES = ['Search','Offer','Inspection','Escrow','Close'];

function stressEmoji(s) {
  if (s < 20) return '😌';
  if (s < 40) return '😤';
  if (s < 65) return '😰';
  return '🤯';
}
function stressClass(s) {
  if (s < 20) return 'good';
  if (s < 40) return 'normal';
  if (s < 65) return 'warn';
  return 'bad';
}
function scoreClass(s) {
  if (s >= 100) return 'good';
  if (s >= 70)  return 'normal';
  if (s >= 45)  return 'warn';
  return 'bad';
}
function moneyClass(n) { return n >= 0 ? 'good' : 'bad'; }
function fmt(n) {
  const abs = Math.abs(n);
  const s = abs >= 1000 ? `$${(abs/1000).toFixed(1)}K` : `$${abs}`;
  return (n < 0 ? '-' : '') + s;
}

function updateHUD() {
  const net = G.savings - G.losses;
  const scoreEl = document.getElementById('hud-score');
  const stressEl = document.getElementById('hud-stress');
  const moneyEl = document.getElementById('hud-money');

  scoreEl.textContent = G.score;
  scoreEl.className = 'hud-val ' + scoreClass(G.score);

  stressEl.textContent = stressEmoji(G.stress);
  stressEl.className = 'hud-val ' + stressClass(G.stress);

  moneyEl.textContent = fmt(net);
  moneyEl.className = 'hud-val ' + moneyClass(net);
}

function buildPhaseTrack() {
  const cur = SCENES[G.scene]?.phase || PHASES[PHASES.length - 1];
  const curIdx = PHASES.indexOf(cur);
  document.getElementById('phase-track').innerHTML =
    PHASES.map((p, i) => {
      let cls = 'phase-pip';
      if (i < curIdx) cls += ' done';
      else if (i === curIdx) cls += ' active';
      return `<div class="${cls}">${p}</div>`;
    }).join('');
}

function flashDelta(delta) {
  if (!delta) return;
  const el = document.createElement('div');
  el.className = 'flash';
  el.style.color = delta > 0 ? var_green : var_red;
  el.textContent = delta > 0 ? `+${delta}` : `${delta}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
function render() {
  if (G.scene >= SCENES.length) { showEnd(); return; }

  const s = SCENES[G.scene];
  G.chosen = false;

  buildPhaseTrack();
  document.getElementById('scene-icon').textContent = s.icon;
  document.getElementById('scene-phase').textContent = `${s.phase} · Scene ${G.scene + 1} / ${SCENES.length}`;
  document.getElementById('scene-title').textContent = s.title;
  document.getElementById('scene-sub').textContent = s.sub;
  document.getElementById('scene-head').style.display = '';

  let html = '';

  // Speech
  html += `<div class="speech">
    <div class="speech-who">
      <div class="speech-dot" style="background:${s.who.color}"></div>
      ${s.who.emoji}&nbsp; ${s.who.label}
    </div>
    <div class="speech-text">"${s.speech}"</div>
  </div>`;

  // Alerts
  (s.alerts || []).forEach(a => {
    html += `<div class="alert alert-${a.type}"><span>${a.icon}</span><span>${a.text}</span></div>`;
  });

  // Choices
  html += `<div class="choices" id="choices">`;
  s.choices.forEach((c, i) => {
    html += `<button class="choice" id="choice-${i}" onclick="choose(${i})">
      <div class="choice-key">${c.key}</div>
      <div class="choice-body">
        <div class="choice-label">${c.label}</div>
        <div class="choice-desc">${c.desc}</div>
      </div>
      <div class="choice-tag tag-${c.tag}">${c.tagLabel}</div>
    </button>`;
  });
  html += `</div>`;

  // Outcome placeholder
  html += `<div class="outcome-box" id="outcome-box"></div>`;

  document.getElementById('scene-body').innerHTML = html;

  // Show OfferWise nudge on inspection scenes
  document.getElementById('ow-nudge').style.display =
    s.phase === 'Inspection' ? 'flex' : 'none';
}

// ══════════════════════════════════════════════════════════════
// CHOOSE
// ══════════════════════════════════════════════════════════════
function choose(idx) {
  if (G.chosen) return;
  G.chosen = true;

  const s = SCENES[G.scene];
  const o = s.choices[idx].out;

  // Dim unselected, highlight selected
  s.choices.forEach((_, i) => {
    const btn = document.getElementById(`choice-${i}`);
    if (i === idx) btn.classList.add('selected');
    else btn.classList.add('dim');
  });

  // Apply state changes
  if (o.score)   { G.score = Math.max(0, Math.min(200, G.score + o.score)); flashDelta(o.score); }
  if (o.stress)  { G.stress = Math.max(0, Math.min(100, G.stress + o.stress)); }
  if (o.savings) { G.savings += o.savings; }
  if (o.losses)  { G.losses += o.losses; }
  updateHUD();

  // Build outcome
  const net = o.savings ? `<span style="color:${var_green}">+${fmt(o.savings)} saved</span>` :
              o.losses  ? `<span style="color:${var_red}">-${fmt(o.losses)}</span>` : '';

  const box = document.getElementById('outcome-box');
  box.innerHTML = `
    <div class="outcome-head" style="color:${o.color}">
      <span>${o.icon}</span>
      <span>${o.title}</span>
      ${net ? `<div class="outcome-delta">${net}</div>` : ''}
    </div>
    <div class="outcome-text">${o.text}</div>
    <button class="next-btn" onclick="next()">
      ${G.scene < SCENES.length - 1 ? 'Next situation →' : 'See your final result →'}
    </button>`;
  box.classList.add('show');
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ══════════════════════════════════════════════════════════════
// NEXT
// ══════════════════════════════════════════════════════════════
function next() {
  G.scene++;
  if (G.scene >= SCENES.length) { showEnd(); return; }
  render();
  document.getElementById('scene-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ══════════════════════════════════════════════════════════════
// END SCREEN
// ══════════════════════════════════════════════════════════════
function showEnd() {
  buildPhaseTrack();
  document.getElementById('scene-head').style.display = 'none';
  document.getElementById('ow-nudge').style.display = 'flex';

  const net = G.savings - G.losses;
  let grade, emoji, summary;
  if      (G.score >= 120) { grade = 'A+'; emoji = '🏆'; summary = "You navigated every curveball with skill and composure. You saved money, caught the disclosure lie, protected yourself legally, and closed with confidence. You're the kind of buyer who doesn't need luck."; }
  else if (G.score >= 95)  { grade = 'A';  emoji = '🏠'; summary = "Solid performance. You caught the major traps, negotiated well, and closed without disaster. A few close calls, but you got across the finish line."; }
  else if (G.score >= 75)  { grade = 'B';  emoji = '😅'; summary = "You made it — but it cost you, in money, stress, or both. The good news: you own a house. The better news: now you know what to watch for next time."; }
  else if (G.score >= 50)  { grade = 'C';  emoji = '😬'; summary = "Rough ride. You paid for a few expensive lessons and accumulated some serious stress. The house is yours, but the journey left marks."; }
  else                      { grade = 'D';  emoji = '😵'; summary = "The sellers, lenders, inspectors, and neighbors all got the better of you at some point. But you own real property now. That counts for something."; }

  const gradeColor = grade.startsWith('A') ? var_green : grade === 'B' ? '#60a5fa' : grade === 'C' ? var_amber : var_red;
  const stressColor = G.stress < 40 ? var_green : G.stress < 65 ? var_amber : var_red;

  document.getElementById('scene-body').innerHTML = `
    <div class="end-wrap show">
      <div class="end-emoji">${emoji}</div>
      <div class="end-headline">You closed!</div>
      <div class="end-grade" style="color:${gradeColor}">${grade}</div>
      <div class="end-caption">${summary}</div>
      <div class="end-stats">
        <div class="end-stat">
          <div class="end-stat-val" style="color:${var_green}">$${G.savings.toLocaleString()}</div>
          <div class="end-stat-lbl">Saved</div>
        </div>
        <div class="end-stat">
          <div class="end-stat-val" style="color:${net >= 0 ? var_green : var_red}">
            ${net >= 0 ? '+' : ''}${fmt(net)}
          </div>
          <div class="end-stat-lbl">Net Result</div>
        </div>
        <div class="end-stat">
          <div class="end-stat-val" style="color:${stressColor}">${stressEmoji(G.stress)}</div>
          <div class="end-stat-lbl">Final Stress</div>
        </div>
      </div>
      <p style="font-size:.8125rem;color:var(--text3);margin-bottom:22px;line-height:1.65;max-width:380px;margin-left:auto;margin-right:auto">
        In a real transaction, OfferWise catches the inspection discrepancies and disclosure gaps <em>before</em> you make your offer — not after.
      </p>
      <button class="play-again" onclick="playAgain()">Play Again</button>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
// RESET
// ══════════════════════════════════════════════════════════════
function playAgain() {
  G.score = 100; G.stress = 0; G.savings = 0; G.losses = 0; G.scene = 0; G.chosen = false;
  updateHUD();
  document.getElementById('scene-head').style.display = '';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (G.chosen) return;
  const idx = {'a':0,'b':1,'c':2}[e.key.toLowerCase()];
  if (idx !== undefined) {
    const btn = document.getElementById(`choice-${idx}`);
    if (btn && !btn.classList.contains('dim')) btn.click();
  }
});

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
updateHUD();
render();
</script>
