              // amber for elevated risk (most properties), green if low.
              const avgScore = dnaScores.reduce((s, x) => s + x.score, 0) / 5;
              const polyColor = avgScore >= 60 ? '#ef4444' : avgScore >= 30 ? '#f59e0b' : '#22c55e';
              const polyFill = avgScore >= 60 ? 'rgba(239,68,68,0.18)' : avgScore >= 30 ? 'rgba(245,158,11,0.18)' : 'rgba(34,197,94,0.18)';
              const composite = Math.round(Number(riskDna.composite_score) || avgScore);

              // Axis labels positioned just outside each vertex of the
              // outer ring. We place tiny text labels so buyers can map
              // each vertex back to an axis name. Top vertex anchors
              // center; right vertices anchor start; left vertices
              // anchor end; vertical alignment uses baseline so the
              // dot at the top vertex isn't covered.
              const labelDefs = [
                { i: 0, anchor: 'middle', dy: -10 },
                { i: 1, anchor: 'start',  dy:   4 },
                { i: 2, anchor: 'start',  dy:  14 },
                { i: 3, anchor: 'end',    dy:  14 },
                { i: 4, anchor: 'end',    dy:   4 },
              ];
              const labels = labelDefs.map(d => {
                const [x, y] = vertex(d.i, R + 8);
                return '<text x="' + x.toFixed(1) + '" y="' + (y + d.dy).toFixed(1) + '" text-anchor="' + d.anchor + '" font-size="9" font-weight="600" fill="#8a99b8" font-family="-apple-system, system-ui, sans-serif" letter-spacing="0.04em">' + dnaScores[d.i].name.toUpperCase() + '</text>';
              }).join('');

              return '<div class="hero-pentagon-wrap">' +
                '<svg class="hero-pentagon" viewBox="-50 -10 320 250" xmlns="http://www.w3.org/2000/svg" aria-label="Property Risk DNA pentagon">' +
                  '<polygon points="' + ringPts(0.2) + '" fill="none" stroke="rgba(138,153,184,0.20)" stroke-width="1"/>' +
                  '<polygon points="' + ringPts(0.4) + '" fill="none" stroke="rgba(138,153,184,0.24)" stroke-width="1"/>' +
                  '<polygon points="' + ringPts(0.6) + '" fill="none" stroke="rgba(138,153,184,0.28)" stroke-width="1"/>' +
                  '<polygon points="' + ringPts(0.8) + '" fill="none" stroke="rgba(138,153,184,0.32)" stroke-width="1"/>' +
                  '<polygon points="' + ringPts(1.0) + '" fill="none" stroke="rgba(138,153,184,0.40)" stroke-width="1"/>' +
                  spokes +
                  '<polygon points="' + scorePts + '" fill="' + polyFill + '" stroke="' + polyColor + '" stroke-width="1.8" stroke-linejoin="round"/>' +
                  dots +
                  labels +
                '</svg>' +
                '<div class="hero-pentagon-caption">' +
                  '<div class="label">Property Risk DNA\u2122</div>' +
                  '<div class="score">' + composite + ' <span class="of">/ 100</span></div>' +
                  '<div class="sub">composite</div>' +
                '</div>' +
              '</div>';
            };
            const heroPentagon = _buildPentagon();

            // ---- SECTION 2 (THE MATH) ----
            // Reads offer_strategy.discount_breakdown. Maps each non-zero
            // line to a user-facing label + basis. Falls back to a single
            // "Total discount" line when breakdown is unavailable.
            const _buildMath = () => {
              const breakdown = offerStrategy.discount_breakdown || {};
              const items = [];
              const push = (key, label, basis) => {
                const v = Math.round(Math.abs(Number(breakdown[key]) || 0));
                if (v > 0) items.push({ label, basis, amount: v });
              };
              push('repair_costs',        'Confirmed repairs',          '\u2192 See Confirmed repairs \u2191');
              push('risk_premium',        'Hidden-issue reserve',       '\u2192 See Hidden-issue reserve \u2191');
              push('transparency_issues', 'Disclosure-risk adjustment', '\u2192 Legal grounds for credit \u2014 see Disclosure \u2191');
              push('market_adjustment',   'Market discount',            '\u2192 Listed above comparable closings');
              push('safety_buffer',       'Safety reserve',             '\u2192 Critical safety findings \u2014 extra contingency');
              push('buyer_sentiment',     'Risk-tolerance adjustment',  '\u2192 Your stated risk appetite');
              push('trauma_buffer',       'Distress-event buffer',      '\u2192 Property history factor');
              const hasBreakdown = items.length > 0;
              const displayedDiscount = Math.max(0, Math.round((askingPrice || 0) - (recommendedOffer || 0)));
              const lineSum = items.reduce((s, i) => s + i.amount, 0);
              const reconciles = Math.abs(lineSum - displayedDiscount) <= 50;
              const aggOffer = offerStrategy.aggressive_offer;
              const walkPrice = offerStrategy.walk_away_price;

              if (_isWalkAway || !recommendedOffer || !askingPrice) return '';

              const rowsHtml = hasBreakdown
                ? items.map(i =>
                    '<div class="row"><div>' + _escHtml(i.label) +
                    '<span class="basis">' + _escHtml(i.basis) + '</span></div>' +
                    '<div class="amount neg">\u2212' + _fmtMoney(i.amount) + '</div></div>').join('')
                : (displayedDiscount > 0
                    ? '<div class="row"><div>Total discount from asking<span class="basis">Combined repair, market, and risk factors</span></div>' +
                      '<div class="amount neg">\u2212' + _fmtMoney(displayedDiscount) + '</div></div>'
                    : '');

              const reconcileNote = (hasBreakdown && !reconciles)
                ? '<div style="margin-top:10px;padding:9px 12px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:7px;font-size:11px;color:#8a99b8;">Note: line items above sum to ' +
                  _fmtMoney(lineSum) + '; headline reflects ' + _fmtMoney(displayedDiscount) +
                  ' total discount. Headline is authoritative.</div>'
                : '';

              const rangesHtml = (aggOffer || walkPrice)
                ? '<div class="ranges">' +
                  (aggOffer ? '<div><b>Aggressive opening:</b> ' + _fmtMoney(aggOffer) + '</div>' : '') +
                  (walkPrice ? '<div><b>Don\u2019t pay more than:</b> ' + _fmtMoney(walkPrice) + ' \u2014 walk if it climbs above this</div>' : '') +
                  '</div>'
                : '';

              return '<section id="math">' +
                '<div class="section-label">The math</div>' +
                '<h2 class="section-title">How we got to ' + _fmtMoney(recommendedOffer) + '</h2>' +
                '<p class="section-sub">Every line below is justified by a section in this report. Each amount is something you can defend in a counter \u2014 it\u2019s not a hunch.</p>' +
                '<div class="math">' +
                  '<div class="row"><div>Asking price</div><div class="amount">' + _fmtMoney(askingPrice) + '</div></div>' +
                  rowsHtml +
                  '<div class="row headline"><div>Recommended offer</div><div class="amount">' + _fmtMoney(recommendedOffer) + '</div></div>' +
                  reconcileNote +
                  rangesHtml +
                '</div>' +
              '</section>';
            };
            const mathSection = _buildMath();

            // ---- MARKET CONTEXT (between Math and Section 3) ----
            // Backs up the "Market discount" line in The Math with the
            // actual AVM, comparable closings, and market-temperature
            // signal that produced it. Renders inline as a smaller
            // section (no big "Section N" label) so it doesn't disrupt
            // the numbered flow Section 3..8.
            //
            // Data sources (all from existing scope):
            //   - offer_strategy.market_context.{avm_price, avm_price_low,
            //     avm_price_high, average_days_on_market, comparables_count,
            //     median_price_per_sqft, market_temperature}
            //   - research_data.profile.comparables (individual comp listings)
            //
            // Renders ONLY when at least one of: AVM > 0, comps_count > 0,
            // or top_comps available. Skips silently otherwise.
            const _buildMarket = () => {
              const mc = (offerStrategy && offerStrategy.market_context) || result.market_context || {};
              const avm        = Number(mc.avm_price || mc.avm || mc.estimated_value) || 0;
              const avmLow     = Number(mc.avm_price_low) || 0;
              const avmHigh    = Number(mc.avm_price_high) || 0;
              const dom        = Number(mc.average_days_on_market || mc.avg_dom) || 0;
              const compsCount = Number(mc.comparables_count) || 0;
              const ppsf       = Number(mc.median_price_per_sqft) || 0;
              const temp       = String(mc.market_temperature || '').toLowerCase();
              const comps = (result.research_data && result.research_data.profile && result.research_data.profile.comparables)
                || [];
              const topComps = comps
                .filter(c => c && Number(c.price) > 0 && c.status !== 'Active')
                .slice(0, 4);

              const hasIntel = avm > 0 || compsCount > 0 || topComps.length > 0;
              if (!hasIntel) return '';

              // Asking vs AVM: percent difference with directional color
              const vsAvmPct = (askingPrice > 0 && avm > 0)
                ? Math.round(((askingPrice - avm) / avm) * 100)
                : null;

              // Map market-temperature enum to display label + color.
              // Hot = seller's market (red), Warm (amber), Balanced (gray),
              // Cold or buyer's = buyer's market (green).
              let tempLabel = '', tempColor = '#8a99b8';
              if (temp === 'hot') { tempLabel = 'Hot'; tempColor = '#ef4444'; }
              else if (temp === 'warm') { tempLabel = 'Warm'; tempColor = '#f59e0b'; }
              else if (temp === 'balanced' || temp === 'neutral') { tempLabel = 'Balanced'; tempColor = '#8a99b8'; }
              else if (temp === 'buyer' || temp === 'cold') { tempLabel = "Buyer's market"; tempColor = '#22c55e'; }

              // Stat tile builder
              const tile = (label, value, sub, color) =>
                '<div class="market-tile">' +
                  '<div class="market-tile-label">' + _escHtml(label) + '</div>' +
                  '<div class="market-tile-value"' + (color ? ' style="color:' + color + ';"' : '') + '>' + value + '</div>' +
                  (sub ? '<div class="market-tile-sub">' + _escHtml(sub) + '</div>' : '') +
                '</div>';

              const tiles = [];
              if (avm > 0) {
                const sub = (avmLow > 0 && avmHigh > 0)
                  ? 'Range: $' + Math.round(avmLow / 1000) + 'K\u2013$' + Math.round(avmHigh / 1000) + 'K'
                  : 'Automated valuation';
                tiles.push(tile('AVM Estimate', _fmtMoney(avm), sub));
              }
              if (vsAvmPct !== null) {
                const label = vsAvmPct > 0 ? vsAvmPct + '% above AVM'
                            : vsAvmPct < 0 ? Math.abs(vsAvmPct) + '% below AVM'
                            : 'At AVM';
                const color = vsAvmPct > 5 ? '#ef4444' : vsAvmPct < -5 ? '#22c55e' : '#e6edf7';
                tiles.push(tile('Asking vs AVM', label, 'Listed at ' + _fmtMoney(askingPrice), color));
              }
              if (dom > 0) {
                tiles.push(tile('Days on Market', String(dom), 'Neighborhood average'));
              }
              if (ppsf > 0) {
                tiles.push(tile('Median $/sqft', '$' + Math.round(ppsf).toLocaleString(), 'Comparable listings'));
              }
              if (tempLabel) {
                tiles.push(tile('Market', tempLabel, '', tempColor));
              }

              // Comparable closings table (only when we have individual comps).
              // v5.89.79: wrapped in overflow-x:auto so mobile users get a
              // horizontal scroll INSIDE the table area rather than the table
              // breaking the page layout.
              const compsTableHtml = topComps.length > 0 ? (
                '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">' +
                '<table class="market-comps" style="min-width:520px;">' +
                  '<thead><tr>' +
                    '<th>Recent comparable sale</th>' +
                    '<th class="num">Beds/Baths</th>' +
                    '<th class="num">Sqft</th>' +
                    '<th class="num">Price</th>' +
                    '<th class="num">$/sqft</th>' +
                  '</tr></thead>' +
                  '<tbody>' +
                    topComps.map(c => {
                      const addrFull = c.address || c.formattedAddress || 'Nearby property';
                      const addr = String(addrFull).split(',')[0] || 'Nearby property';
                      const beds = Number(c.bedrooms) || 0;
                      const baths = Number(c.bathrooms) || 0;
                      const sqft = Number(c.sqft) || 0;
                      const price = Number(c.price) || 0;
                      const ppsfRow = Number(c.price_per_sqft) || (sqft > 0 ? Math.round(price / sqft) : 0);
                      const distMi = Number(c.distance_miles) || 0;
                      return '<tr>' +
                        '<td>' + _escHtml(addr) +
                          (distMi > 0 ? '<span class="dist"> \u00B7 ' + distMi.toFixed(1) + 'mi away</span>' : '') +
                        '</td>' +
                        '<td class="num">' + (beds > 0 ? beds + 'bd' : '\u2014') +
                          (baths > 0 ? ' / ' + baths + 'ba' : '') + '</td>' +
                        '<td class="num">' + (sqft > 0 ? sqft.toLocaleString() : '\u2014') + '</td>' +
                        '<td class="num strong">' + _fmtMoney(price) + '</td>' +
                        '<td class="num">' + (ppsfRow > 0 ? '$' + ppsfRow.toLocaleString() : '\u2014') + '</td>' +
                      '</tr>';
                    }).join('') +
                  '</tbody>' +
                '</table>' +
                '</div>'
              ) : '';

              // Asking-vs-AVM commentary box
              const commentHtml = (avm > 0 && vsAvmPct !== null) ? (
                '<div class="market-callout">' +
                  (vsAvmPct > 5
                    ? 'Listed price sits <strong>' + vsAvmPct + '% above</strong> the automated valuation. Comparable closings support negotiating downward.'
                  : vsAvmPct < -5
                    ? 'Listed price sits <strong>' + Math.abs(vsAvmPct) + '% below</strong> the automated valuation. The market may already be discounting this property.'
                    : 'Listed price aligns closely with the automated valuation.') +
                '</div>'
              ) : '';

              return '<section id="market">' +
                '<h2 class="section-title">What the comps say</h2>' +
                '<p class="section-sub">This is the data behind the <em>Market discount</em> line in the math above. Comparable closings and automated valuation tell you what the property is worth on its own \u2014 separate from the inspection findings.</p>' +
                '<div class="market">' +
                  (tiles.length > 0 ? '<div class="market-tiles">' + tiles.join('') + '</div>' : '') +
                  commentHtml +
                  compsTableHtml +
                '</div>' +
              '</section>';
            };
            const marketSection = _buildMarket();

            // ---- SECTION 3 (CONFIRMED REPAIRS) ----
            // Top 6 categories by cost (desc). Includes any category with
            // cost > 0 OR score >= 50 OR safety_concern. Severity:
            // >=75 critical, >=50 major, else moderate.
            const _buildRepairs = () => {
              const sorted = [...categoryScores].sort((a, b) => {
                const aHigh = Number(a.estimated_cost_high) || 0;
                const bHigh = Number(b.estimated_cost_high) || 0;
                return bHigh - aHigh;
              });
              const cards = sorted.filter(c => {
                const high = Number(c.estimated_cost_high) || 0;
                const score = Number(c.score) || 0;
                return high > 0 || score >= 50 || c.safety_concern;
              }).slice(0, 6);

              if (cards.length === 0) return '';

              const totalLow = cards.reduce((s, c) => s + (Number(c.estimated_cost_low) || 0), 0);
              const totalHigh = cards.reduce((s, c) => s + (Number(c.estimated_cost_high) || 0), 0);
              const totalAvg = Math.round((totalLow + totalHigh) / 2);

              const cardsHtml = cards.map(c => {
                const score = Number(c.score) || 0;
                const sevLabel = score >= 75 ? 'Critical' : score >= 50 ? 'Major' : 'Moderate';
                const sevClass = score >= 75 ? 'critical' : score >= 50 ? 'amber' : 'blue';
                const sevSpanClass = score >= 75 ? '' : 'amber';
                const cost = _fmtKRange(c.estimated_cost_low, c.estimated_cost_high);
                const issues = (c.key_issues || [])
                  .filter(i => i && String(i).trim().length > 4)
                  .slice(0, 4)
                  .map(i => '<li>' + _escHtml(i) + '</li>').join('');
                let action = '';
                if (c.requires_specialist) {
                  action = 'Get a <strong>licensed specialist</strong> ($400\u2013$600) before close. Specialist opinion makes any subsequent ask defensible.';
                } else if (c.safety_concern) {
                  action = 'This is a <strong>safety finding</strong>. Demand repair credit or completion before close \u2014 as-is doesn\u2019t apply to safety.';
                } else if (score >= 75) {
                  action = 'Get a written contractor quote before close. Ask for a <strong>credit at closing</strong> \u2014 more flexible than \u201Ccomplete before close.\u201D';
                } else {
                  action = 'Document this in your repair-credit request. Group with other findings in the same trade for a single ask.';
                }
                return '<div class="card ' + sevClass + '">' +
                  '<div class="card-head">' +
                    '<div class="title">' + _escHtml(_catLabel(c.category)) + ' <span class="sev ' + sevSpanClass + '">' + sevLabel + '</span></div>' +
                    (cost ? '<div class="cost">' + cost + '</div>' : '') +
                  '</div>' +
                  (issues ? '<ul class="findings">' + issues + '</ul>' : '') +
                  '<div class="action">' + action + '</div>' +
                '</div>';
              }).join('');

              return '<section id="repairs">' +
                '<h2 class="section-title">Confirmed repairs \u00B7 itemized findings</h2>' +
                '<p class="section-sub">These came directly out of the inspection report \u2014 documented findings, not predictions. Per-item ranges are shown for reference; your single, reconciled cost and negotiation position is in <strong>the analysis below</strong>, which separates what to negotiate from what to hold in reserve.</p>' +
                cardsHtml +
              '</section>';
            };
            const repairsSection = _buildRepairs();

            // ---- SECTION 4 (HIDDEN-ISSUE RESERVE) ----
            // Top 3 predictions, sorted by probability. Action line scales
            // with probability (>=90 build in now, >=70 warrant contingency,
            // else note in due diligence).
            const _buildReserve = () => {
              if (predictions.length === 0) return '';
              const sorted = [...predictions].sort((a, b) => (Number(b.probability) || 0) - (Number(a.probability) || 0));
              const top = sorted.slice(0, 3);
              const more = sorted.slice(3);
              const totalAvg = top.reduce((s, p) => {
                const lo = Number(p.estimated_cost_low) || 0;
                const hi = Number(p.estimated_cost_high) || 0;
                return s + Math.round((lo + hi) / 2);
              }, 0);

              const cardsHtml = top.map(p => {
                const title = p.predicted_issue || p.prediction || p.title || 'Predicted issue';
                const probPct = p.probability ? Math.round(Number(p.probability) * 100) : 0;
                const cost = _fmtKRange(p.estimated_cost_low, p.estimated_cost_high);
                const indicators = Array.isArray(p.observable_indicators) ? p.observable_indicators
                  : Array.isArray(p.reasoning) ? p.reasoning : [];
                const whyText = indicators.length > 0
                  ? indicators.slice(0, 2).map(r => typeof r === 'string' ? r : (r.description || r.text || '')).filter(Boolean).join(' ')
                  : (p.reason || p.why || '');
                let action = '';
                if (probPct >= 90) {
                  action = 'High likelihood. Build this cost into your offer now \u2014 don\u2019t wait until year 1.';
                } else if (probPct >= 70) {
                  action = 'Likely enough to warrant a contingency. Consider a specialist inspection ($400\u2013$600).';
                } else {
                  action = 'Worth noting in your due diligence. Walk the property and look for indicators before close.';
                }
                return '<div class="pred-card">' +
                  '<div class="head">' +
                    '<div class="title">' + _escHtml(title) + '</div>' +
                    '<div class="meta">' +
                      (probPct > 0 ? '<div class="prob">' + probPct + '% likely</div>' : '') +
                      (cost ? '<div class="cost">' + cost + '</div>' : '') +
                    '</div>' +
                  '</div>' +
                  (whyText ? '<p class="why"><b>Why:</b> ' + _escHtml(whyText) + '</p>' : '') +
                  '<div class="action">' + action + '</div>' +
                '</div>';
              }).join('');

              const moreHtml = more.length > 0
                ? '<div class="pred-more">+ ' + more.length + ' more prediction' + (more.length !== 1 ? 's' : '') + ' at lower confidence</div>'
                : '';

              return '<section id="reserve">' +
                '<h2 class="section-title">Hidden-issue reserve' + (totalAvg > 0 ? ' \u00B7 ' + _fmtMoney(totalAvg) : '') + '</h2>' +
                '<p class="section-sub">These <strong>aren\u2019t in the inspection</strong>. They\u2019re things our model thinks are likely given what the inspection <em>did</em> find. Treat this as a reserve fund built into your offer, not a separate ask.</p>' +
                cardsHtml + moreHtml +
              '</section>';
            };
            const reserveSection = _buildReserve();

            // ---- SECTION 5 (DISCLOSURE GAPS) ----
            // Built from cross_reference.contradictions (seller-said /
            // inspector-found pairs). Falls back to red_flags if cross-ref
            // is absent.
            const _buildDisclosure = () => {
              const contradictions = (result.cross_reference && result.cross_reference.contradictions) || [];
              const grade = transparency.grade || '';
              const omitsCount = contradictions.length;

              if (omitsCount === 0 && redFlags.length === 0) return '';

              const top = contradictions.slice(0, 3);
              const more = Math.max(0, contradictions.slice(3).length);

              let cardsHtml = top.map(c => {
                const finding = (c && c.inspection_finding) || {};
                const discItem = (c && c.disclosure_item) || {};
                const sev = String(finding.severity || '').toLowerCase();
                const sevLabel = sev.includes('critical') ? 'Critical'
                  : sev.includes('major') ? 'Major'
                  : sev.includes('moderate') ? 'Moderate' : '';
                const cat = _catLabel(finding.category || discItem.category || 'Disclosure');
                const sellerSaid = discItem.details || discItem.statement || discItem.text || discItem.question || 'Not disclosed';
                const inspFound = finding.description || finding.detail || finding.finding || c.explanation || '';
                const cost = _fmtKRange(finding.estimated_cost_low, finding.estimated_cost_high);
                const isCritical = sev.includes('critical');
                const action = isCritical
                  ? 'This is <strong>disclosure misrepresentation</strong>, not as-is territory. Demand full repair credit or completion before close.'
                  : 'Document this gap in your repair-credit ask. The seller signed a binding disclosure; this is your standing to renegotiate.';
                return '<div class="disc-card">' +
                  '<div class="head">' +
                    '<div class="cat">' + _escHtml(cat) + (sevLabel ? ' <span class="sev">' + sevLabel + '</span>' : '') + '</div>' +
                    (cost ? '<div class="cost">' + cost + '</div>' : '') +
                  '</div>' +
                  '<div class="pair">' +
                    '<div class="k">Seller said:</div>' +
                    '<div class="v">' + _escHtml(sellerSaid) + '</div>' +
                    '<div class="k">Inspector found:</div>' +
                    '<div class="v found">' + _escHtml(inspFound) + '</div>' +
                  '</div>' +
                  '<div class="action">' + action + '</div>' +
                '</div>';
              }).join('');

              if (cardsHtml === '' && redFlags.length > 0) {
                cardsHtml = redFlags.slice(0, 3).map(rf => {
                  const text = typeof rf === 'string' ? rf : (rf.description || rf.flag || rf.title || '');
                  return '<div class="disc-card">' +
                    '<div class="head"><div class="cat">Disclosure flag</div></div>' +
                    '<div class="pair">' +
                      '<div class="k">Issue:</div>' +
                      '<div class="v found">' + _escHtml(text) + '</div>' +
                    '</div>' +
                    '<div class="action">Surface this in your repair-credit ask. Seller disclosure is a binding document.</div>' +
                  '</div>';
                }).join('');
              }

              const moreHtml = more > 0
                ? '<div class="disc-more">+ ' + more + ' more omission' + (more !== 1 ? 's' : '') + ' (see Reference \u2014 appendix)</div>'
                : '';
              const labelExtras = (grade ? ' \u00B7 Seller transparency: ' + _escHtml(grade) : '') +
                (omitsCount > 0 ? ' \u00B7 ' + omitsCount + ' omission' + (omitsCount !== 1 ? 's' : '') : '');

              return '<section id="disclosure">' +
                '<div class="section-label">Section 5' + labelExtras + '</div>' +
                '<h2 class="section-title">What the seller didn\u2019t tell you</h2>' +
                '<p class="section-sub">The seller signed a legally-binding disclosure document. The inspection found' +
                (omitsCount > 0 ? ' <strong>' + omitsCount + ' issue' + (omitsCount !== 1 ? 's' : '') + '</strong>' : ' issues') +
                ' that document missed or misrepresented. This is your strongest negotiation lever \u2014 they were wrong in specific places, in writing.</p>' +
                cardsHtml + moreHtml +
              '</section>';
            };
            // v5.89.226: mutually exclusive with the reasoning section
            // (same disclosure-vs-inspection analysis). When the reasoning
            // layer is active it supersedes this older cross_reference
            // section, mirroring the on-screen report. Flag off => unchanged.
            const _reasoningActive = !!(result.reasoning && Array.isArray(result.reasoning.claims));
            const disclosureSection = _reasoningActive ? '' : _buildDisclosure();

            // ---- SECTION 6 (WALK) ----
            // Build walk conditions from actual data; up to 4 conditions.
            const _buildWalk = () => {
              const topRepair = (categoryScores || []).slice().sort((a, b) => (Number(b.estimated_cost_high)||0) - (Number(a.estimated_cost_high)||0))[0];
              const needsSpecialist = (categoryScores || []).some(c => c.requires_specialist);
              const contraCount = ((result.cross_reference && result.cross_reference.contradictions) || []).length;
              const ceiling = offerStrategy.conservative_offer ||
                (recommendedOffer && askingPrice ? Math.round(recommendedOffer + (askingPrice - recommendedOffer) * 0.4) : null);

              const conds = [];
              if (topRepair && (topRepair.estimated_cost_high || 0) > 0) {
                const name = _catLabel(topRepair.category).toLowerCase();
                const costRange = _fmtKRange(topRepair.estimated_cost_low, topRepair.estimated_cost_high);
                conds.push({
                  headline: 'If the seller refuses repair credit on the ' + name + ' findings.',
                  detail: 'This is the highest-cost system in this report' + (costRange ? ' (' + costRange + ')' : '') + '. A credit at closing is more flexible than \u201Ccomplete before close,\u201D but it\u2019s not optional.'
                });
              }
              if (needsSpecialist) {
                const trades = (categoryScores || []).filter(c => c.requires_specialist).map(c => _catLabel(c.category)).slice(0, 2);
                conds.push({
                  headline: 'If the seller refuses to extend the inspection contingency for a specialist review.',
                  detail: (trades.length > 0 ? trades.join(' and ') + ' findings' : 'These findings') + ' need a $400\u2013$600 specialist opinion before you commit. Refusing a 7\u201310 day extension is a signal.'
                });
              }
              if (ceiling && askingPrice && !_isWalkAway) {
                conds.push({
                  headline: 'If their counter lands above ' + _fmtMoney(ceiling) + '.',
                  detail: 'The data in this report \u2014 repair costs, hidden-issue reserve, disclosure gaps \u2014 doesn\u2019t support paying more than that. At higher prices the deal stops being defensible.'
                });
              }
              if (contraCount >= 3) {
                conds.push({
                  headline: 'If three or more disclosure omissions stay uncorrected after a written response.',
                  detail: 'Found ' + contraCount + ' omissions in this disclosure. If multiple go unaddressed in negotiation, that\u2019s a pattern of bad faith \u2014 not oversight.'
                });
              }

              if (conds.length === 0 && (positiveFindings || []).length === 0) return '';

              const introText = _isWalkAway
                ? 'This property\u2019s combination of issues puts it outside a defensible offer. Specifically:'
                : 'You should not be afraid to walk from this deal. Real-estate inventory exists. This isn\u2019t the only house. Here are the conditions under which we would walk:';
              const titleText = _isWalkAway ? 'Why we said walk' : 'What could make you walk';

              const condsHtml = conds.map(c =>
                '<li><b>' + _escHtml(c.headline) + '</b> ' + _escHtml(c.detail) + '</li>'
              ).join('');

              const quoteBlock = !_isWalkAway
                ? '<div class="quote">Most buyers fall in love with the house and overpay because no one told them walking was acceptable. Walking is acceptable.</div>'
                : '';

              const positives = (positiveFindings || []).slice(0, 5)
                .map(pf => typeof pf === 'string' ? pf : (pf.description || pf.finding || pf.title || ''))
                .filter(Boolean);
              const posBlock = positives.length > 0
                ? '<div class="walk-pos"><div class="title">What this property HAS going for it</div>' +
                  '<ul>' + positives.map(p => '<li>' + _escHtml(p) + '</li>').join('') + '</ul>' +
                  '<div class="note">These don\u2019t change the recommended offer. They\u2019re already priced in.</div>' +
                  '</div>'
                : '';

              return '<section id="walk">' +
                '<h2 class="section-title">' + titleText + '</h2>' +
                '<p class="section-sub">' + introText + '</p>' +
                '<div class="walk">' +
                  (condsHtml ? '<ul class="conds">' + condsHtml + '</ul>' : '') +
                  quoteBlock + posBlock +
                '</div>' +
              '</section>';
            };
            const walkSection = _buildWalk();

            // ---- SECTION 7 (TOOLKIT) ----
            // Numbered asks (1-4) built from data: repair credit (when
            // total > 0); disclosure remedy (when contradictions > 0);
            // inspection extension (when specialist needed); sewer/plumbing
            // contingency (when plumbing category present). Each ask has
            // body + monospace blockquote draft. Summary rail at bottom.
            const _buildToolkit = () => {
              const repairTotal = repairHigh > 0 ? Math.round((repairLow + repairHigh) / 2) : 0;
              const contraCount = ((result.cross_reference && result.cross_reference.contradictions) || []).length;
              const needsSpecialist = (categoryScores || []).some(c => c.requires_specialist);
              const plumbingCat = (categoryScores || []).find(c => /plumb|sewer/i.test(_catLabel(c.category)));
              const ceiling = offerStrategy.conservative_offer ||
                (recommendedOffer && askingPrice ? Math.round(recommendedOffer + (askingPrice - recommendedOffer) * 0.4) : null);

              if (_isWalkAway || !recommendedOffer) return '';

              const asks = [];
              if (repairTotal > 0) {
                asks.push({
                  num: 1,
                  title: 'Repair credit at closing',
                  amount: _fmtMoney(repairTotal),
                  body: '<b>Basis:</b> Confirmed repairs <a href="#repairs">\u2191</a>. Itemized breakdown exportable.',
                  quote: 'Per inspection findings, buyer requests credit at closing for confirmed deferred maintenance totaling ' + _fmtMoney(repairTotal) + '. Itemized breakdown attached as Addendum A.'
                });
              }
              if (contraCount > 0) {
                asks.push({
                  num: asks.length + 1,
                  title: 'Disclosure remedy',
                  amount: 'Conditional',
                  body: '<b>Basis:</b> ' + contraCount + ' disclosure omission' + (contraCount !== 1 ? 's' : '') + ' <a href="#disclosure">\u2191</a>.',
                  quote: 'Buyer requests written acknowledgment of the ' + contraCount + ' disclosed items inconsistent with the inspection report, and either repair credit or repair completion before close on items marked critical.'
                });
              }
              if (needsSpecialist) {
                asks.push({
                  num: asks.length + 1,
                  title: 'Inspection contingency extension',
                  amount: '+10 days',
                  body: '<b>Basis:</b> Specialist review required for findings <a href="#repairs">\u2191</a>.',
                  quote: 'Buyer requests a 10-day extension of the inspection contingency to obtain specialist opinions on items flagged in the analysis.'
                });
              }
              if (plumbingCat && (plumbingCat.estimated_cost_high || 0) > 0) {
                const plumbCost = _fmtKRange(plumbingCat.estimated_cost_low, plumbingCat.estimated_cost_high);
                asks.push({
                  num: asks.length + 1,
                  title: 'Sewer / plumbing contingency',
                  amount: plumbCost || 'credit OR video-confirmed repair',
                  body: '<b>Basis:</b> Plumbing findings <a href="#repairs">\u2191</a>' + (contraCount > 0 ? ' and Disclosure <a href="#disclosure">\u2191</a>' : '') + '.',
                  quote: 'Buyer makes offer contingent on seller providing video confirmation of sewer lateral repair, or repair credit at closing.'
                });
              }
              if (asks.length === 0) return '';

              const asksHtml = asks.map(a => {
                return '<div class="ask">' +
                  '<div class="head">' +
                    '<div class="num">' + a.num + '</div>' +
                    '<div class="title">' + _escHtml(a.title) + '</div>' +
                    '<div class="amount">' + _escHtml(a.amount) + '</div>' +
                  '</div>' +
                  '<p class="body">' + a.body + '</p>' +
                  (a.quote ? '<blockquote>' + _escHtml(a.quote) + '</blockquote>' : '') +
                '</div>';
              }).join('');

              const railHtml = ceiling
                ? '<div class="summary-rail">' +
                  'If all asks accepted in full: effective price drops to <b>' + _fmtMoney(recommendedOffer) + '</b>. ' +
                  'Either way, don\u2019t pay more than <em>' + _fmtMoney(ceiling) + '</em> \u2014 walk if the price climbs above that.' +
                  '</div>'
                : '';

              return '<section id="toolkit">' +
                '<h2 class="section-title">Your negotiation toolkit</h2>' +
                '<p class="section-sub">Take this to your agent. Each ask below is keyed to a finding above.</p>' +
                asksHtml + railHtml +
              '</section>';
            };
            const toolkitSection = _buildToolkit();

            // ---- SECTION 8 (REFERENCE) ----
            // Groups inspection extracts by category, caps at 8 per group +
            // 10 disclosure extracts. Renders inline so buyers sharing the
            // PDF see the raw supporting data, not a "click to expand."
            const _buildReference = () => {
              const inspGroups = {};
              (inspExtracts || []).forEach(e => {
                const cat = _catLabel(e.category || e.cat || 'Inspection');
                if (!inspGroups[cat]) inspGroups[cat] = [];
                const text = e.description || e.text || e.finding || (typeof e === 'string' ? e : '');
                if (text && String(text).trim().length > 4) inspGroups[cat].push(text);
              });
              const inspBlocks = Object.keys(inspGroups).map(cat => {
                const items = inspGroups[cat].slice(0, 8)
                  .map(t => '<li>' + _escHtml(t) + '</li>').join('');
                return '<div class="group">' +
                  '<div class="group-title">' + _escHtml(cat) + ' \u00B7 ' + inspGroups[cat].length + ' finding' + (inspGroups[cat].length !== 1 ? 's' : '') + '</div>' +
                  '<ul>' + items + '</ul>' +
                '</div>';
              }).join('');

              const discItems = (discExtracts || []).slice(0, 10)
                .map(e => {
                  const text = e.description || e.text || e.statement || (typeof e === 'string' ? e : '');
                  return text && String(text).trim().length > 4
                    ? '<li>' + _escHtml(text) + '</li>'
                    : '';
                }).filter(Boolean).join('');
              const discBlock = discItems
                ? '<div class="group"><div class="group-title">Seller disclosure extracts</div><ul>' + discItems + '</ul></div>'
                : '';

              const inspCount = Object.values(inspGroups).reduce((s, arr) => s + arr.length, 0);
              if (inspCount === 0 && !discItems) return '';

              return '<div class="reference">' +
                '<div class="head">' +
                  '<div class="left">Reference material \u00B7 ' +
                    (inspCount > 0 ? inspCount + ' inspection finding' + (inspCount !== 1 ? 's' : '') : '') +
                    (inspCount > 0 && discItems ? ' \u00B7 ' : '') +
                    (discItems ? 'disclosure extracts' : '') +
                  '</div>' +
                  '<div class="right">Source data</div>' +
                '</div>' +
                '<div class="body">' + inspBlocks + discBlock + '</div>' +
              '</div>';
            };
            const referenceSection = _buildReference();

            // ---- REASONING (Phase 1d, preview) ----
            // Renders ONLY when result.reasoning is present (backend flag
            // OFFERWISE_REASONING_IN_REPORT). Empty string otherwise => no change
            // to the report when the flag is off.
            const _buildReasoning = () => {
              const R = result.reasoning;
              if (!R || !Array.isArray(R.claims)) return '';
              const issues = Array.isArray(R.issues) ? R.issues : [];
              const offer = R.offer || {};
              const concerns = R.claims.filter(c => c && c.polarity === 'contradicts');
              const clean = R.claims.filter(c => c && c.polarity === 'supports');

              const issueCards = issues.map(i => {
                const cls = String(i.decision_class || '').replace(/_/g, ' ');
                const silent = i.silent_hazard ? ' <span class="sev">silent hazard</span>' : '';
                const items = Array.isArray(i.items) ? i.items.join(', ') : '';
                return '<div class="disc-card">' +
                  '<div class="head"><div class="cat">' + _escHtml(i.title || cls) + silent + '</div>' +
                    (i.severity ? '<div class="cost">' + _escHtml(i.severity) + '</div>' : '') + '</div>' +
                  '<div class="pair"><div class="k">Decision:</div><div class="v">' + _escHtml(cls) + '</div>' +
                    (items ? '<div class="k">Items:</div><div class="v">' + _escHtml(items) + '</div>' : '') +
                  '</div></div>';
              }).join('');

              const offerBits = [];
              const _fmtUsd = (n) => '$' + (n||0).toLocaleString('en-US');
              if ((offer.price_adjustment_low || offer.price_adjustment_high))
                offerBits.push('<div class="k">Estimated price-adjustment basis:</div><div class="v"><strong>' + _fmtUsd(offer.price_adjustment_low) + ' \u2013 ' + _fmtUsd(offer.price_adjustment_high) + '</strong></div>');
              if ((offer.price_adjustment_basis || []).length)
                offerBits.push('<div class="k">Negotiation items:</div><div class="v">' + _escHtml(offer.price_adjustment_basis.join('; ')) + '</div>');
              if ((offer.buyer_held_reserve || []).length)
                offerBits.push('<div class="k">Buyer-held reserve (separate):</div><div class="v">' + _escHtml(offer.buyer_held_reserve.join('; ')) + '</div>');
              if ((offer.pre_close_actions || []).length)
                offerBits.push('<div class="k">Pre-close actions:</div><div class="v">' + _escHtml(offer.pre_close_actions.join('; ')) + '</div>');
              const offerHtml = offerBits.length ? '<div class="disc-card"><div class="head"><div class="cat">Offer handoff</div></div><div class="pair">' + offerBits.join('') + '</div></div>' : '';

              return '<section id="reasoning">' +
                '<div class="section-label">Preview \\u00B7 Checklist reasoning \\u00B7 ' + _escHtml(R.checklist_version || '') + '</div>' +
                '<h2 class="section-title">What the checklist checked</h2>' +
                '<p class="section-sub">A clean disclosure is not a clean property. We resolved <strong>' + R.claims.length + '</strong> property-facts against a ' + (R.resolved_items || '') + '-item checklist \\u2014 ' + concerns.length + ' concern' + (concerns.length !== 1 ? 's' : '') + ', ' + clean.length + ' clear.</p>' +
                issueCards + offerHtml +
              '</section>';
            };
            const reasoningSection = _buildReasoning();

            // === ASSEMBLE FULL REPORT ===
            const reportHtml = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OfferWise\u2122 Analysis \u2014 ${result.property_address || 'Property Report'}</title>
<style>

    --panel:      #121a2e;
    --panel-2:    #0f1729;
    --line:       #1f2a44;

    --text:       #e6edf7;
    --muted:      #8a99b8;
    --dim:        #5d6b8a;
    --accent:     #f97316;
    --accent-2:   #f59e0b;
    --green:      #22c55e;
    --red:        #ef4444;
    --amber:      #f59e0b;
    --blue:       #60a5fa;
    --purple:     #a78bfa;
  }

    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    font-size: 15px; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

    border-bottom: 1px solid var(--line-soft);

  }
  .nav .brand { font-weight: 700; color: var(--text); letter-spacing: -.01em; font-size: 14px; }
  .nav .brand .tm { font-size: 10px; color: var(--dim); margin-left: 3px; }

    background:
      radial-gradient(1200px 400px at 0% 0%, rgba(249,115,22,.10), transparent 60%),
      radial-gradient(800px 300px at 100% 100%, rgba(167,139,250,.08), transparent 60%),

    border: 1px solid var(--line);

  /* v5.89.12: .card.critical/.amber/.blue left-bar variants dropped.
     The bars painted a uniform color stripe down every card in a
     section without distinguishing individual cards from each other.
     The section heading + per-card severity tag already carry the
     meaning. Mirrors the web-side change. Empty rule blocks left as
     breadcrumbs in case we want to reintroduce per-card severity
     highlights later. */
  .card.critical { }

// Scroll reveal for premium results animations
(function() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
  
  // Observe on initial load and re-observe when DOM changes (React renders)
  const watchForReveals = () => {
    document.querySelectorAll('.ow-reveal:not(.visible)').forEach(el => observer.observe(el));
  };
  watchForReveals();
  // Re-check periodically as React renders new content
  const revealInterval = setInterval(watchForReveals, 500);
  // Stop checking after 30s
  setTimeout(() => clearInterval(revealInterval), 30000);
})();
</script>
