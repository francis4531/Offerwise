    <!-- 📊 FUNNEL TRACKING - lightweight, fire-and-forget -->
    <script>
        window.ofwFunnel = function(stage, metadata) {
            try {
                fetch('/api/funnel/track', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({stage: stage, source: 'app', metadata: metadata || null}),
                }).catch(function(){});
            } catch(e) {}
        };
    </script>
    
    <!-- 🧪 TURK TESTING MODE v5.54.11 - Pure JavaScript, NO React state! -->
    <script>
        window.turkTracker = {
            sessionToken: null,
            isActive: false,
            turkId: null,
            taskId: null,
            
            // Initialize on page load - checks URL params
            init: function() {
                const urlParams = new URLSearchParams(window.location.search);
                const turkId = urlParams.get('turk_id') || urlParams.get('workerId');
                const taskId = urlParams.get('task_id') || urlParams.get('hitId');
                
                if (turkId || taskId) {
                    console.log('🧪 [TURK] Mode detected:', { turkId, taskId });
                    this.isActive = true;
                    this.turkId = turkId || 'anonymous';
                    this.taskId = taskId || 'unknown';
                    
                    // Show turk banner
                    this.showBanner();
                    
                    // Start session
                    fetch('/api/turk/start', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            turk_id: this.turkId,
                            task_id: this.taskId,
                            screen_width: window.innerWidth,
                            screen_height: window.innerHeight
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        console.log('🧪 [TURK] Session started:', data);
                        this.sessionToken = data.session_token;
                    })
                    .catch(err => console.error('🧪 [TURK] Session error:', err));
                }
            },
            
            // Fire-and-forget tracking - never blocks, never causes re-renders
            track: function(action) {
                if (!this.isActive || !this.sessionToken) return;
                
                console.log('🧪 [TURK] Track:', action);
                
                // Fire and forget - don't await, don't care about response
                fetch('/api/turk/track', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_token: this.sessionToken,
                        action: action
                    })
                }).catch(() => {}); // Silently ignore errors
            },
            
            // Show testing banner at top of page
            showBanner: function() {
                const banner = document.createElement('div');
                banner.id = 'turk-banner';
                banner.innerHTML = '🧪 <strong>Testing Mode Active</strong> - Your actions are being recorded for quality assurance';
                banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;padding:8px 16px;text-align:center;font-size:14px;z-index:99999;font-family:system-ui,sans-serif;';
                document.body.insertBefore(banner, document.body.firstChild);
            },
            
            // Complete session and show completion code
            complete: function() {
                if (!this.isActive || !this.sessionToken) {
                    alert('No active test session found.');
                    return;
                }
                
                fetch('/api/turk/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_token: this.sessionToken })
                })
                .then(res => res.json())
                .then(data => {
                    this.showCompletionModal(data.completion_code);
                })
                .catch(err => {
                    console.error('🧪 [TURK] Complete error:', err);
                    alert('Error completing session. Please contact support.');
                });
            },
            
            // Show completion modal - pure HTML, outside React
            showCompletionModal: function(code) {
                const modal = document.createElement('div');
                modal.id = 'turk-completion-modal';
                modal.innerHTML = `
                    <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:100000;font-family:system-ui,sans-serif;">
                        <div style="background:#1e293b;border-radius:24px;padding:48px;text-align:center;max-width:500px;border:3px solid #22c55e;">
                            <div style="font-size:64px;margin-bottom:24px;">🎉</div>
                            <h2 style="font-size:28px;font-weight:800;color:#22c55e;margin:0 0 16px 0;">Test Complete!</h2>
                            <p style="color:#94a3b8;margin-bottom:32px;line-height:1.6;">
                                Thank you for testing OfferWise! Copy this code and paste it into Mechanical Turk to receive payment.
                            </p>
                            <div style="background:#0f172a;padding:24px;border-radius:12px;margin-bottom:24px;border:2px dashed #22c55e;">
                                <div style="color:#64748b;font-size:12px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">
                                    Your Completion Code
                                </div>
                                <div id="turk-code" style="font-size:32px;font-weight:900;color:#22c55e;font-family:monospace;letter-spacing:2px;">
                                    ${code}
                                </div>
                            </div>
                            <button onclick="navigator.clipboard.writeText('${code}');alert('Code copied!');" style="padding:14px 32px;background:#22c55e;color:white;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-right:12px;">
                                📋 Copy Code
                            </button>
                            <button onclick="document.getElementById('turk-completion-modal').remove();" style="padding:14px 32px;background:transparent;color:#94a3b8;border:1px solid #475569;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">
                                Close
                            </button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                
                // Hide the banner
                const banner = document.getElementById('turk-banner');
                if (banner) banner.style.display = 'none';
            },
            
            // Rate experience (optional)
            rate: function(stars) {
                if (!this.sessionToken) return;
                fetch('/api/turk/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_token: this.sessionToken, rating: stars })
                }).catch(() => {});
            }
        };
        
        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            window.turkTracker.init();
        });
    </script>

    <div id="root">
        <!-- Instant loading skeleton — visible while Babel/React loads -->
        <div style="max-width:800px;margin:0 auto;padding:40px 20px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;">

                </div>

            </div>
            <div style="text-align:center;padding:60px 0;">
                <div style="width:40px;height:40px;border:3px solid rgba(59,130,246,0.2);border-top-color:#3b82f6;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        
        const OfferWise = () => {
          const [currentStep, setCurrentStep] = useState('loading'); // Start with loading
          
          // Force browser repaint when step changes — fixes blank-until-scroll
          useEffect(() => {
            requestAnimationFrame(() => {
              window.scrollTo(0, 0);
              document.body.style.display = 'none';
              document.body.offsetHeight;
              document.body.style.display = '';
            });
          }, [currentStep]);
          const [propertyData, setPropertyData] = useState({});
          const [buyerProfile, setBuyerProfile] = useState({});
          const [result, setResult] = useState(null);
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState('');
          const [hasProfile, setHasProfile] = useState(false);
          const [userHasPaid, setUserHasPaid] = useState(true); // Default true to avoid flash of gated content
          // const [showRepairCalculation, setShowRepairCalculation] = useState(false); // Removed for IP protection
          
          // Screenshot Evidence Modal (v5.51.0)
          const [showScreenshotModal, setShowScreenshotModal] = useState(false);
          const [screenshotLoading, setScreenshotLoading] = useState(false);
          const [screenshotImage, setScreenshotImage] = useState(null);
          const [screenshotError, setScreenshotError] = useState('');
          const [screenshotInfo, setScreenshotInfo] = useState({ docType: '', pageNum: 0, title: '', quote: '' });
          const [screenshotZoom, setScreenshotZoom] = useState(1); // 1 = 100%
          
          // File objects for View Source are stored in propertyData (v5.51.5)
          // - propertyData.disclosureFileObj
          // - propertyData.inspectionFileObj
          
          // Analysis progress state (shared between PropertyDocumentsStep and AnalyzeStep)
          const [analysisProgress, setAnalysisProgress] = useState({ current: 0, total: 0, message: '' });
          
          // 🤖 Property Research Agent state
          const [researchData, setResearchData] = useState(null);
          const [researchAddress, setResearchAddress] = useState('');
          
          // Collapsible section states for patent explanations
          const [showRepairExplanation, setShowRepairExplanation] = useState(false);
          const [showRiskPremiumExplanation, setShowRiskPremiumExplanation] = useState(false);
          const [showTransparencyExplanation, setShowTransparencyExplanation] = useState(false);
          const [showDocumentExtracts, setShowDocumentExtracts] = useState(false); // v5.55.8 - Credibility
          
          // 🛡️ Consent management state
          const [showConsentModal, setShowConsentModal] = useState(false);
          const [showCredibilityTooltip, setShowCredibilityTooltip] = useState(false);
          const [consentType, setConsentType] = useState('analysis_disclaimer');
          const [consentText, setConsentText] = useState('');
          const [consentVersion, setConsentVersion] = useState('');
          const [consentPending, setConsentPending] = useState(false);
          const [hasAnalysisConsent, setHasAnalysisConsent] = useState(false);
          const [needsConsent, setNeedsConsent] = useState(false);
          const [consentStatuses, setConsentStatuses] = useState([]);
          const [consentCheckComplete, setConsentCheckComplete] = useState(false); // v5.54.10: Gate for upload
          
          // 🎨 UI ENHANCEMENT STATE (v5.54.0)
          // v5.54.10: Use ref for sticky bar to prevent re-renders during upload
          const stickyBarRef = React.useRef(null);
          const [activeSection, setActiveSection] = useState('summary');
          const [collapsedSections, setCollapsedSections] = useState({
            riskDna: true,
            transparency: true,
            predicted: true,
            decisionPath: false
          });
          const [activeTooltip, setActiveTooltip] = useState(null);
          const [animatedScores, setAnimatedScores] = useState(false);
          
          // 🎯 PMF SURVEY STATE (v5.54.50)
          const [showPMFToast, setShowPMFToast] = useState(false);
          const [showPMFModal, setShowPMFModal] = useState(false);
          const [pmfResponse, setPMFResponse] = useState(null);
          
          // 🆓 FREE TIER GATE — DISABLED (v5.70.7)
          // All users with 0 credits are now blocked at the analysis start.
          // Anyone who reaches results has paid or is a developer.
          const renderFreeTierGate = (sectionLabel) => {
            return null;
          };
          
          // PMF Survey: Check if we should show survey after analysis completes
          useEffect(() => {
            if (result && currentStep === 'results') {
              // Get survey status from localStorage
              const surveyData = JSON.parse(localStorage.getItem('pmf_survey') || '{}');
              const analysesCount = (surveyData.analyses_count || 0) + 1;
              
              // Update count
              localStorage.setItem('pmf_survey', JSON.stringify({
                ...surveyData,
                analyses_count: analysesCount
              }));
              
              // Don't show if already responded
              if (surveyData.responded) return;
              
              // v5.62.43: Show modal only after 5th analysis (delay 3 seconds)
              // Removed 1st-analysis toast — too early, users haven't formed opinions yet
              if (analysesCount === 5 && !surveyData.modal_shown) {
                setTimeout(() => {
                  setShowPMFModal(true);
                  localStorage.setItem('pmf_survey', JSON.stringify({
                    ...JSON.parse(localStorage.getItem('pmf_survey') || '{}'),
                    modal_shown: true
                  }));
                }, 3000);
              }
            }
          }, [result, currentStep]);
          
          // Submit PMF survey response
          const submitPMFSurvey = async (disappointment, extras = {}) => {
            try {
              await fetch('/api/survey/pmf', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  disappointment,
                  trigger: extras.trigger || 'in_app',
                  main_benefit: extras.main_benefit || '',
                  improvement: extras.improvement || ''
                })
              });
              
              // Mark as responded
              localStorage.setItem('pmf_survey', JSON.stringify({
                ...JSON.parse(localStorage.getItem('pmf_survey') || '{}'),

              const context = canvas.getContext('2d');
              canvas.width = viewport.width;

                  const searchTerms = normalizedQuote.split(' ').filter(t => t.length > 3).slice(0, 5);
                  
                  // Find matching text items
                  let matchedItems = [];
                  let fullText = '';
                  let itemPositions = [];
                  
                  // Build full text and track positions
                  textItems.forEach((item, idx) => {
                    if (item.str) {
                      itemPositions.push({ start: fullText.length, end: fullText.length + item.str.length, idx });
                      fullText += item.str + ' ';
                    }
                  });
                  
                  const normalizedFullText = fullText.toLowerCase();
                  
                  // Find where search terms appear
                  searchTerms.forEach(term => {
                    let pos = normalizedFullText.indexOf(term);
                    while (pos !== -1) {
                      // Find which text item this belongs to
                      itemPositions.forEach(ip => {
                        if (pos >= ip.start && pos < ip.end) {
                          if (!matchedItems.includes(ip.idx)) {
                            matchedItems.push(ip.idx);
                          }
                        }
                      });
                      pos = normalizedFullText.indexOf(term, pos + 1);

                        const x = tx[4] * scale;

                        const width = item.width ? item.width * scale : item.str.length * 8 * scale;
                        const height = (item.height || 14) * scale;
                        
                        context.fillRect(x - 2, y - 2, width + 4, height + 4);

                              <div style={{ fontSize:'12px', color:'#64748b', fontWeight:600, textTransform:'uppercase', letterSpacing:'1px', marginBottom:'10px' }}>Undisclosed Issues</div>
                              {tr.undisclosed_issues.slice(0,8).filter(issue => {
                                const text = typeof issue === 'string' ? issue : (issue.finding || issue.description || issue.issue || issue.title || '');
                                const lower = text.toLowerCase();
                                return text.length > 20 && text.length < 500
                                  // Boilerplate disclaimers
                                  && !lower.includes('disclaimer')
                                  && !lower.includes('not a qualified')
                                  && !lower.includes('you agree not to hold')
                                  && !lower.includes('not responsible for future')
                                  && !lower.includes('intended to reduce')
                                  && !lower.includes('maintenance:')
                                  && !lower.includes('items marked maintenance')
                                  && !lower.includes('presence of mold')
                                  && !lower.includes('not readily visible')
                                  && !lower.includes('therefore, you agree')
                                  && !lower.includes('component or system failure')
                                  && !lower.includes('non-discovery of')
                                  && !lower.includes('latent defects')
                                  && !lower.includes('the inspection and report')
                                  && !lower.includes('mold inspector')
                                  // Inspector methodology boilerplate
                                  && !lower.includes('inspector will only')
                                  && !lower.includes('only make elaborating')
                                  && !lower.includes('nefarious items')
                                  // Positive/neutral statements (not issues)
                                  && !lower.includes('is durable and resistant')
                                  && !lower.includes('pipes are durable')
                                  && !lower.includes('in good condition')
                                  && !lower.includes('functioning properly')
                                  && !lower.includes('no repair needed')
                                  && !lower.includes('no action required')
                                  // Raw parser output
                                  && !lower.includes('recommended diy')
                                  && !lower.includes('diy project')
                                  && !lower.includes('contact a handyman')
                                  && !/^recommendation\s/i.test(text)
                                  // ALL CAPS raw output (3+ consecutive caps words)
                                  && !/[A-Z]{4,}\s[A-Z]{4,}\s[A-Z]{4,}/.test(text)
                                  // Section number prefixes
                                  && !/^\d+\.\d+\.\d+/.test(text)
                                  && !lower.includes('maintenance item')
                                  // v5.72.9: Educational/normalizing language
                                  && !lower.includes('is not uncommon')
                                  && !lower.includes('is common in')
                                  && !lower.includes('is normal for')
                                  && !lower.includes('is typical for')
                                  && !lower.includes('nothing unusual')
                                  // v5.72.9: Scope disclaimers
                                  && !lower.includes('beyond the scope')
                                  && !lower.includes('outside the scope')
                                  && !lower.includes('not within the scope')
                                  && !lower.includes('not part of this inspection')
                                  // v5.72.9: Age normalizing
                                  && !lower.includes('in homes over')
                                  && !lower.includes('for a home of this age')
                                  // v5.72.9: Leading asterisks
                                  && !text.startsWith('*Full')
                                  && !text.startsWith('*This');
                              }).map((issue, idx) => {
                                const text = typeof issue === 'string' ? issue : (issue.finding || issue.description || issue.issue || issue.title || '');
                                // Clean up: remove leading section numbers, "Recommendation" prefix, asterisks
                                let clean = text.replace(/^[\*•]\s*/, '').replace(/^(Recommendation\s+)?(\d+\.\d+(\.\d+)?\s+)?/i, '').replace(/\s+/g, ' ').trim();
                                // OCR fixes: common broken words from PDF parsing
                                clean = clean.replace(/retro\s+tted/gi, 'retrofitted')
                                  .replace(/\breplace\b(?!\s*(with|by|the|it|d\b|s\b|ment))/gi, 'fireplace')
                                  .replace(/replaces\b/gi, 'fireplaces')
                                  .replace(/\s{2,}/g, ' ');

                                return (
                                  <Finding key={idx} color="#ef4444" text={clean} />
                                );
                              })}
                            </div>

                            </div>

                          {redFlags.length === 0 && !tr.undisclosed_issues?.length && !tr.minimized_issues?.length && !tr.evasion_phrases?.length && tr.omission_score === undefined && (
                            <div style={{ fontSize:'14px', color:'#94a3b8', lineHeight:1.6 }}>
                              {tr.grade ? `This disclosure received a grade of ${tr.grade}` + (tr.transparency_score || tr.trust_score || tr.score || tr.transparency_score ? ` (${tr.transparency_score || tr.trust_score || tr.score || tr.transparency_score}/100)` : '') + '. ' : ''}
                              {(tr.transparency_score || tr.trust_score || tr.score || tr.transparency_score || 0) >= 70 ? 'The seller appears to have been generally transparent.' :
                               (tr.transparency_score || tr.trust_score || tr.score || tr.transparency_score || 0) >= 40 ? 'Some areas of concern. Review the full document carefully.' :
                               'Significant transparency issues detected. Proceed with caution.'}
                            </div>
                          )}
                        </div>
                      </ECard>

                        {positiveFindings.slice(0,6).map((pf, idx) => (

                    ${ev.detail || ev.description ? `<div style="font-size:12px;color:#475569;margin-top:6px;line-height:1.65;">${ev.detail || ev.description}</div>` : ''}
                    ${ev.source ? `<div style="font-size:11px;color:#94a3b8;margin-top:4px;">Source: ${ev.source}</div>` : ''}
                </div>`;
            }).join('');
            
            // Predictions
            const predictionsHtml = predictions.slice(0, 6).map(pred => {
                const probPct = Math.round((pred.probability || 0) * 100);
                const probColor = probPct >= 85 ? '#b91c1c' : probPct >= 75 ? '#b45309' : probPct >= 65 ? '#a16207' : '#6d28d9';
                const urgColor = pred.urgency === 'critical' ? '#b91c1c' : pred.urgency === 'high' ? '#b45309' : pred.urgency === 'medium' ? '#a16207' : '#15803d';
                const reasons = pred.observable_indicators || [];
                return `<div style="padding:16px 20px;background:#faf5ff;border:1px solid #e9d5ff;border-radius:8px;margin-bottom:10px;">
                    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:${reasons.length > 0 ? '10' : '0'}px;">
                        <div style="flex:1;">
                            <div style="font-weight:700;color:#1e1b4b;font-size:14px;line-height:1.5;">${pred.predicted_issue || ''}</div>
                            <div style="display:flex;gap:16px;margin-top:4px;font-size:11px;color:#64748b;">
                                <span>Est. $${(pred.estimated_cost_low || 0).toLocaleString()}–$${(pred.estimated_cost_high || 0).toLocaleString()}</span>
                                <span>${pred.likely_timeline || ''}</span>
                                <span style="color:${urgColor};font-weight:700;text-transform:uppercase;">${pred.urgency || ''}</span>
                            </div>
                        </div>
                        <div style="text-align:center;flex-shrink:0;margin-left:16px;">
                            <div style="font-size:20px;font-weight:900;color:${probColor};">${probPct}%</div>
                            <div style="font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;">probability</div>
                        </div>
                    </div>
                    ${reasons.length > 0 ? `<div style="background:rgba(109,40,217,0.05);border-radius:4px;padding:10px 14px;border-left:3px solid #7c3aed;">
                        <div style="font-size:10px;color:#6d28d9;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Analysis Reasoning</div>
                        ${reasons.map(r => `<div style="font-size:12px;color:#475569;line-height:1.6;">${r}</div>`).join('')}
                    </div>` : ''}
                    ${pred.specialist_needed ? `<div style="font-size:11px;color:#64748b;margin-top:6px;">Recommended specialist: <strong>${pred.specialist_needed}</strong></div>` : ''}
                </div>`;
            }).join('');
            
            // Document Extracts
            const inspExtracts = documentExtracts.inspection_extracts || [];
            const discExtracts = documentExtracts.disclosure_extracts || [];
            let extractsHtml = '';
            if (inspExtracts.length > 0) {
                extractsHtml += `<div style="margin-bottom:20px;">
                    <div style="font-size:12px;font-weight:700;color:#334155;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">Inspection Report — ${inspExtracts.length} Findings Extracted</div>
                    ${inspExtracts.slice(0, 12).map(item => {
                        const sc = sevColor(item.severity);
                        return `<div style="padding:8px 14px;border-left:3px solid ${sc};margin-bottom:4px;background:#fafafa;border-radius:0 4px 4px 0;">
                            <div style="display:flex;justify-content:space-between;align-items:start;">
                                <div style="font-size:12px;color:#1e293b;line-height:1.6;flex:1;">${item.finding || item.description || ''}</div>
                                <span style="font-size:10px;color:${sc};font-weight:600;text-transform:uppercase;flex-shrink:0;margin-left:8px;">${item.severity || ''}</span>
                            </div>
                            <div style="font-size:10px;color:#94a3b8;margin-top:2px;">${fmtCat(item.category || '')}</div>
                        </div>`;
                    }).join('')}
                    ${inspExtracts.length > 12 ? `<div style="font-size:11px;color:#94a3b8;padding:8px 14px;font-style:italic;">+ ${inspExtracts.length - 12} additional findings extracted</div>` : ''}
                </div>`;
            }
            if (discExtracts.length > 0) {
                extractsHtml += `<div>
                    <div style="font-size:12px;font-weight:700;color:#334155;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">Seller Disclosure — ${discExtracts.length} Items Analyzed</div>
                    ${discExtracts.slice(0, 10).map(item => {
                        const disclosed = item.disclosed === true || item.disclosed === 'yes';
                        return `<div style="padding:8px 14px;border-left:3px solid ${disclosed ? '#15803d' : '#b45309'};margin-bottom:4px;background:#fafafa;border-radius:0 4px 4px 0;">

                                <span style="font-size:10px;font-weight:600;color:${disclosed ? '#15803d' : '#b45309'};flex-shrink:0;margin-left:8px;">${disclosed ? 'DISCLOSED' : 'NOT DISCLOSED'}</span>
                            </div>
                        </div>`;
                    }).join('')}
                </div>`;
            }
            
            // Strategic Options
            const strategicHtml = strategicOptions.map((opt, i) => {
                const colors = ['#15803d', '#1d4ed8', '#b45309', '#6d28d9'];
                const bgs = ['#f0fdf4', '#eff6ff', '#fffbeb', '#faf5ff'];
                const borders = ['#bbf7d0', '#bfdbfe', '#fde68a', '#e9d5ff'];
                return `<div style="background:${bgs[i] || '#f8fafc'};border:1px solid ${borders[i] || '#e2e8f0'};border-radius:8px;padding:18px 20px;margin-bottom:10px;border-left:5px solid ${colors[i] || '#94a3b8'};">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div style="font-weight:700;color:#0f172a;font-size:15px;">${opt.label || opt.title || 'Option ' + (i+1)}</div>
                        ${opt.offer_amount ? `<div style="font-size:20px;font-weight:900;color:${colors[i] || '#334155'};">$${Math.round(opt.offer_amount).toLocaleString()}</div>` : ''}
                    </div>
                    ${opt.strategy ? `<div style="font-size:12px;color:#475569;margin-top:8px;line-height:1.65;font-style:italic;">${opt.strategy}</div>` : ''}
                    ${opt.rationale ? `<div style="font-size:12px;color:#334155;margin-top:6px;line-height:1.65;">${opt.rationale}</div>` : ''}
                    ${(opt.tactics || []).length > 0 ? `<div style="margin-top:10px;">${opt.tactics.slice(0, 4).map(t => `<div style="font-size:11px;color:#475569;padding:3px 0 3px 14px;border-left:2px solid ${colors[i] || '#94a3b8'};margin-bottom:3px;line-height:1.5;">${t}</div>`).join('')}</div>` : ''}
                </div>`;
            }).join('');
            
            // Negotiation Leverage
            const negotiationHtml = negotiationItems.slice(0, 8).map(item => {
                const text = typeof item === 'string' ? item : (item.description || item.issue || '');
                return `<div style="padding:10px 16px;border-left:3px solid #1d4ed8;margin-bottom:6px;background:#eff6ff;border-radius:0 4px 4px 0;">
                    <div style="font-size:12px;color:#1e3a5f;line-height:1.6;">${text}</div>
                </div>`;

            // Transparency sub-scores
            let transparencyDetailHtml = '';
            if (transparencyScore !== undefined && transparencyScore !== null) {
                const tGrade = typeof transparencyGrade === 'object' ? (transparencyGrade.value || '') : transparencyGrade;
                const tColor = transparencyScore >= 70 ? '#15803d' : transparencyScore >= 40 ? '#b45309' : '#b91c1c';
                const tLabel = transparencyScore >= 70 ? 'Transparent' : transparencyScore >= 40 ? 'Partially Transparent' : 'Low Transparency';
                transparencyDetailHtml = `
                    <div style="display:flex;align-items:center;gap:24px;margin-bottom:16px;">
                        <div style="text-align:center;">
                            <div style="font-size:44px;font-weight:800;color:${tColor};line-height:1;">${Math.round(transparencyScore)}</div>
                            <div style="font-size:10px;color:#94a3b8;margin-top:2px;">out of 100</div>
                        </div>
                        ${tGrade ? `<div style="font-size:48px;font-weight:800;color:${tColor};">${tGrade}</div>` : ''}
                        <div style="flex:1;">
                            <div style="font-size:14px;font-weight:700;color:${tColor};">${tLabel}</div>
                            ${transparency.trust_level ? `<div style="font-size:12px;color:#475569;margin-top:4px;">${transparency.trust_level}</div>` : ''}
                            <div style="display:flex;gap:20px;margin-top:8px;">
                                ${transparency.omission_score !== undefined ? `<div style="font-size:11px;color:#64748b;">Omission: <strong>${transparency.omission_score}</strong></div>` : ''}
                                ${transparency.minimization_score !== undefined ? `<div style="font-size:11px;color:#64748b;">Minimization: <strong>${transparency.minimization_score}</strong></div>` : ''}
                                ${transparency.consistency_score !== undefined ? `<div style="font-size:11px;color:#64748b;">Consistency: <strong>${transparency.consistency_score}</strong></div>` : ''}
                            </div>
                        </div>
                    </div>`;
            }
            
            // Count sections for TOC
            const hasDealBreakers = dealBreakers.length > 0;
            const hasPositives = positiveFindings.length > 0;
            const hasTransparency = transparencyScore !== undefined && transparencyScore !== null;
            const hasRedFlags = redFlags.length > 0;
            const hasVerifications = externalVerifications.length > 0;
            const hasPredictions = predictions.length > 0;
            const hasExtracts = inspExtracts.length > 0 || discExtracts.length > 0;
            const hasStrategy = strategicOptions.length > 0 || (offerStrategy.reasoning && offerStrategy.reasoning.length > 0);
            const hasNegotiation = negotiationItems.length > 0;
            
            // === ASSEMBLE FULL REPORT ===
            const reportHtml = `<!DOCTYPE html>
<html lang="en">

<body>

    <!-- ═══════════════════ COVER ═══════════════════ -->

    <div style="height:1px;background:#e2e8f0;margin:16px 0 24px;"></div>

    <!-- PROPERTY HEADER -->

    ${recommendedOffer > 0 ? `

            ${repairHigh > 0 ? `<div style="font-size:12px;color:#166534;margin-top:2px;">Estimated repairs: $${repairLow.toLocaleString()}–$${repairHigh.toLocaleString()}</div>` : ''}
        </div>
    </div>
    ` : ''}

    <!-- KEY METRICS -->
    <div class="section avoid-break">
        <div class="metric-grid">
            <div class="metric-box">
                <div class="metric-value" style="color:${riskColor};">${offerScoreValue}</div>
                <div class="metric-label">OfferScore™</div>

            <div class="metric-box">

                <div class="metric-label">Est. Repair Costs</div>

            <div class="metric-box">
                <div class="metric-value" style="font-size:20px;color:${hasTransparency ? (transparencyScore >= 70 ? '#15803d' : transparencyScore >= 40 ? '#b45309' : '#b91c1c') : '#94a3b8'};">
                    ${hasTransparency ? Math.round(transparencyScore) + '/100' : 'N/A'}
                </div>
                <div class="metric-label">Seller Transparency</div>
            </div>
        </div>
    </div>
    
    <!-- EXECUTIVE SUMMARY -->
    <div class="section avoid-break">
        <div class="section-title"><span class="icon">📊</span> Executive Summary</div>

            ${genExecSummary()}

    <!-- CRITICAL ISSUES -->
    ${hasDealBreakers ? `

    ${categoryHtml ? `

                </tr>

                ${categoryHtml}

    <!-- SELLER TRANSPARENCY -->
    ${hasTransparency ? `

        <div class="section-title"><span class="icon">🔍</span> Seller Transparency Report™</div>

    <!-- RED FLAGS -->
    ${hasRedFlags ? `

    <!-- EXTERNAL VERIFICATION -->
    ${hasVerifications ? `
    <div class="section">
        <div class="section-title"><span class="icon">🤖</span> External Verification</div>
        <div style="font-size:12px;color:#64748b;margin-bottom:10px;line-height:1.6;">AI cross-reference of seller claims against public records and government data sources.</div>
        ${verificationsHtml}

    <!-- ═══════════════════ PREDICTIONS & DOCUMENTS ═══════════════════ -->
    ${hasPredictions || hasExtracts ? '<div class="page-break"></div>' : ''}

    ${hasPredictions ? `
    <div class="section">
        <div class="section-title"><span class="icon">🔮</span> Predicted Hidden Issues (${predictions.length})</div>
        <div style="font-size:12px;color:#64748b;margin-bottom:12px;line-height:1.6;">AI-powered pattern analysis identifies potential issues that may not be visible during a standard inspection.</div>
        ${predictionsHtml}
    </div>
    ` : ''}

    ${hasExtracts ? `
    <div class="section">
        <div class="section-title"><span class="icon">📄</span> Document Analysis</div>

    <!-- ═══════════════════ STRATEGY & NEGOTIATION ═══════════════════ -->
    ${hasStrategy || hasNegotiation ? '<div class="page-break"></div>' : ''}

            // Talking Points Doc
            if (data.talking_points) {
                html += `
                    <div style="background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 8px; padding: 16px;">
                        <div style="font-weight: 600; color: #60a5fa; margin-bottom: 8px;">💬 Talking Points</div>
                        <button onclick="showDocumentModal('Talking Points', \`${data.talking_points.content.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" style="padding: 8px 12px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; width: 100%;">View & Copy</button>
                    </div>
                `;
            }
            
            // Agent Email
            if (data.agent_email) {
                html += `
                    <div style="background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 8px; padding: 16px;">
                        <div style="font-weight: 600; color: #a78bfa; margin-bottom: 8px;">📧 Agent Email</div>
                        <button onclick="showDocumentModal('Agent Email', \`${data.agent_email.content.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" style="padding: 8px 12px; background: #8b5cf6; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; width: 100%;">View & Copy</button>
                    </div>
                `;
            }
            
            html += `</div></div>`;
            
            return html;
        }
        
        window.showDocumentModal = function(title, content) {
            const modal = document.createElement('div');
            modal.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 10001; padding: 20px;';
            modal.innerHTML = `
                <div style="background: #1e293b; border-radius: 16px; max-width: 600px; width: 100%; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column;">
                    <div style="padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="margin: 0; color: #e2e8f0;">${title}</h3>
                        <div>
                            <button onclick="navigator.clipboard.writeText(this.closest('div').parentElement.querySelector('.doc-content').innerText).then(() => this.textContent = '✅ Copied!')" style="padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; margin-right: 8px;">📋 Copy</button>
                            <button onclick="this.closest('div').parentElement.parentElement.parentElement.remove()" style="padding: 8px 16px; background: #475569; color: white; border: none; border-radius: 6px; cursor: pointer;">Close</button>
                        </div>
                    </div>
                    <div class="doc-content" style="padding: 20px; overflow-y: auto; color: #e2e8f0; white-space: pre-wrap; line-height: 1.6;">${content}</div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
        };
        
        // Render with error boundary
        console.log('Rendering OfferWise app...');
        if(window.ofwFunnel) window.ofwFunnel('app_page_view');
        ReactDOM.render(
          <ErrorBoundary>
            <OfferWise />
          </ErrorBoundary>,
          document.getElementById('root')
        );
        console.log('App rendered successfully');
    </script>

       onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 20px rgba(59, 130, 246, 0.4)';">

    </a>

<script>
// Scroll reveal for premium results animations
(function() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
  
  // Observe on initial load and re-observe when DOM changes (React renders)
  const watchForReveals = () => {
    document.querySelectorAll('.ow-reveal:not(.visible)').forEach(el => observer.observe(el));
  };
  watchForReveals();
  // Re-check periodically as React renders new content
  const revealInterval = setInterval(watchForReveals, 500);
  // Stop checking after 30s
  setTimeout(() => clearInterval(revealInterval), 30000);
})();
</script>
