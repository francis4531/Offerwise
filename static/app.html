                }).catch(function(){});
            } catch(e) {}

    <!-- 🧪 TURK TESTING MODE v5.54.11 - Pure JavaScript, NO React state! -->
    <script>
        window.turkTracker = {
            sessionToken: null,
            isActive: false,
            turkId: null,
            taskId: null,
            
            // Initialize on page load - checks URL params
            init: function() {
                const urlParams = new URLSearchParams(window.location.search);
                const turkId = urlParams.get('turk_id') || urlParams.get('workerId');
                const taskId = urlParams.get('task_id') || urlParams.get('hitId');
                
                if (turkId || taskId) {
                    console.log('🧪 [TURK] Mode detected:', { turkId, taskId });
                    this.isActive = true;
                    this.turkId = turkId || 'anonymous';
                    this.taskId = taskId || 'unknown';
                    
                    // Show turk banner
                    this.showBanner();
                    
                    // Start session
                    fetch('/api/turk/start', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            turk_id: this.turkId,
                            task_id: this.taskId,
                            screen_width: window.innerWidth,
                            screen_height: window.innerHeight
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        console.log('🧪 [TURK] Session started:', data);
                        this.sessionToken = data.session_token;
                    })
                    .catch(err => console.error('🧪 [TURK] Session error:', err));
                }
            },
            
            // Fire-and-forget tracking - never blocks, never causes re-renders
            track: function(action) {
                if (!this.isActive || !this.sessionToken) return;
                
                console.log('🧪 [TURK] Track:', action);
                
                // Fire and forget - don't await, don't care about response
                fetch('/api/turk/track', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_token: this.sessionToken,
                        action: action
                    })
                }).catch(() => {}); // Silently ignore errors
            },
            
            // Show testing banner at top of page
            showBanner: function() {
                const banner = document.createElement('div');
                banner.id = 'turk-banner';
                banner.innerHTML = '🧪 <strong>Testing Mode Active</strong> - Your actions are being recorded for quality assurance';
                banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;padding:8px 16px;text-align:center;font-size:14px;z-index:99999;font-family:system-ui,sans-serif;';
                document.body.insertBefore(banner, document.body.firstChild);
            },
            
            // Complete session and show completion code
            complete: function() {
                if (!this.isActive || !this.sessionToken) {
                    alert('No active test session found.');
                    return;
                }
                
                fetch('/api/turk/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_token: this.sessionToken })
                })
                .then(res => res.json())
                .then(data => {
                    this.showCompletionModal(data.completion_code);
                })
                .catch(err => {
                    console.error('🧪 [TURK] Complete error:', err);
                    alert('Error completing session. Please contact support.');
                });
            },
            
            // Show completion modal - pure HTML, outside React
            showCompletionModal: function(code) {
                const modal = document.createElement('div');
                modal.id = 'turk-completion-modal';
                modal.innerHTML = `
                    <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:100000;font-family:system-ui,sans-serif;">
                        <div style="background:#1e293b;border-radius:24px;padding:48px;text-align:center;max-width:500px;border:3px solid #22c55e;">
                            <div style="font-size:64px;margin-bottom:24px;">🎉</div>
                            <h2 style="font-size:28px;font-weight:800;color:#22c55e;margin:0 0 16px 0;">Test Complete!</h2>
                            <p style="color:#94a3b8;margin-bottom:32px;line-height:1.6;">
                                Thank you for testing OfferWise™! Copy this code and paste it into Mechanical Turk to receive payment.
                            </p>
                            <div style="background:#0f172a;padding:24px;border-radius:12px;margin-bottom:24px;border:2px dashed #22c55e;">
                                <div style="color:#64748b;font-size:12px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">
                                    Your Completion Code
                                </div>
                                <div id="turk-code" style="font-size:32px;font-weight:900;color:#22c55e;font-family:monospace;letter-spacing:2px;">
                                    ${code}
                                </div>
                            </div>
                            <button onclick="navigator.clipboard.writeText('${code}');alert('Code copied!');" style="padding:14px 32px;background:#22c55e;color:white;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-right:12px;">
                                📋 Copy Code
                            </button>
                            <button onclick="document.getElementById('turk-completion-modal').remove();" style="padding:14px 32px;background:transparent;color:#94a3b8;border:1px solid #475569;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">
                                Close
                            </button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                
                // Hide the banner
                const banner = document.getElementById('turk-banner');
                if (banner) banner.style.display = 'none';
            },
            
            // Rate experience (optional)
            rate: function(stars) {
                if (!this.sessionToken) return;
                fetch('/api/turk/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_token: this.sessionToken, rating: stars })
                }).catch(() => {});
            }
        };
        
        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            window.turkTracker.init();
        });
    </script>
    
    <style>
      /* ──────────────────────────────────────────────────────────────────
         v5.88.56: Design tokens for the report's visual language.
         These were retrofitted by surveying the values used in the
         high-quality report cards (Key Issues rows, Offer Options panel,
         Property Risk DNA, Evidence & Details). Any new card on this page
         should compose from these tokens so it inherits the report's look,
         not invent its own.
         Usage in JSX: style={{ background: 'var(--owc-surface)' }}.
         New surfaces that drift from these should be questioned in code review.
         ─────────────────────────────────────────────────────────────────── */
      :root {
        /* Surface colors. owc = "offerwise card". */
        --owc-surface:           rgba(20,28,46,0.6);
        --owc-surface-subtle:    rgba(15,23,42,0.4);
        --owc-surface-locked:    linear-gradient(135deg, rgba(249,115,22,0.08), rgba(245,158,11,0.05));

        /* Borders */
        --owc-border:            1px solid rgba(51,65,85,0.4);
        --owc-border-strong:     1px solid rgba(51,65,85,0.5);
        --owc-border-locked:     1px solid rgba(249,115,22,0.25);

        /* Radii */
        --owc-radius-row:        10px;
        --owc-radius-card:       12px;
        --owc-radius-panel:      16px;
        --owc-radius-button:     10px;

        /* Typography */
        --owc-text-body:         #e2e8f0;  /* primary body */
        --owc-text-muted:        #94a3b8;  /* muted secondary */
        --owc-text-dim:          #64748b;  /* low-importance caption */
        --owc-text-faint:        #475569;  /* lowest-importance hint */
        --owc-text-bright:       #f1f5f9;  /* big headlines */

        /* Section-header typography (matches "KEY ISSUES" / "EVIDENCE & DETAILS"). */
        --owc-section-size:      13px;
        --owc-section-weight:    700;
        --owc-section-tracking:  0.08em;

        /* Accent colors — kept as raw values so card borders can use them
           via `borderLeft: '3px solid var(--owc-accent-positive)'` etc. */
        --owc-accent-positive:   #22c55e;   /* green: aggressive offer, success */
        --owc-accent-primary:    #60a5fa;   /* blue: recommended, default actions */
        --owc-accent-attention:  #f59e0b;   /* amber: warning, conservative offer */
        --owc-accent-danger:     #ef4444;   /* red: deal breakers, walk-away */
        --owc-accent-brand:      #f97316;   /* orange: primary brand, share, paid */
        --owc-accent-info:       #0ea5e9;   /* cyan: notify/watch tracking */

        /* Primary CTA gradient (matches the unlock buttons and main share button). */
        --owc-gradient-primary:  linear-gradient(90deg, #f97316, #f59e0b);

        /* v5.88.56 — extracted from existing patterns. Use these to keep
           NEW cards visually consistent with the report's design language
           instead of styling from scratch (which is how Share-the-Love and
           Track-this-Property drifted in the first place). */

        /* Card body prose treatment. Matches the body text inside KEY
           ISSUES rows and Evidence & Details rows. */
        --owc-prose-size:        13px;
        --owc-prose-leading:     1.65;

        /* Card title treatment. Matches the title row in KEY ISSUES and
           the OfferWatch panel. */
        --owc-title-size:        16px;
        --owc-title-weight:      700;

        /* Card padding. Matches the offer-options cards and risk DNA panel. */
        --owc-card-padding:      20px 22px;

        /* CTA buttons — primary (gradient orange) and secondary (ghost).
           Match the Unlock and Share buttons in the offer-options panel. */
        --owc-btn-primary-bg:    linear-gradient(90deg, #f97316, #f59e0b);
        --owc-btn-primary-color: #ffffff;
        --owc-btn-secondary-bg:  transparent;
        --owc-btn-secondary-color: #94a3b8;
        --owc-btn-secondary-border: 1px solid rgba(51,65,85,0.7);
        --owc-btn-padding:       10px 18px;
        --owc-btn-radius:        9px;
        --owc-btn-size:          13px;
        --owc-btn-weight:        600;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes shine {
        0% { left: -100%; }
        100% { left: 100%; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      html { overflow-x: hidden; }
      body {
        margin: 0;
        /* v5.89.123: the results page has two position:fixed ambient-glow orbs
           (.ow-results::before/::after) anchored off-screen at right:-200px /
           left:-200px (and the float animation pushes them further out). Fixed
           elements escape overflow-x:clip on .ow-results, so they were extending
           the document's scrollable width and producing a horizontal scrollbar.
           Clipping X at the root (html+body) clips them at the viewport edge —
           the soft glow still shows, the scrollbar is gone. */
        overflow-x: hidden;
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
      }

      /* v5.89.17: type scale for the buyer report. Before this release the
         report used ~24 distinct font sizes across inline styles and CSS
         strings (12, 12.5, 13, 13.5, 14, 15, 16, 17, 18, 20, 22, 24, 26, 28,
         32, 38, 44, 48 px and more). Most were one-offs picked by eye. The
         8-token ramp below collapses the redundant sizes into a coherent
         system:

           --ow-fs-eyebrow       11px  All-caps section eyebrows
           --ow-fs-meta          12px  Captions, badges, footnotes, microcopy
           --ow-fs-small         13px  Card body text, secondary prose
           --ow-fs-body          14px  Primary body prose
           --ow-fs-strong        16px  Emphasized inline content
           --ow-fs-card-title    17px  Card / ask titles inside sections
           --ow-fs-section-title 26px  Section titles ("Confirmed repairs · $X")
           --ow-fs-display       clamp(40px, 6.5vw, 64px)  Hero offer number

         Convention: any new inline style in the buyer report should use
         var(--ow-fs-*) rather than a literal pixel size. Sizes outside this
         ramp (e.g. 24px for legacy admin pages) are kept as one-offs in
         their original scope and not migrated. */
      :root {
        --ow-fs-micro:          10px;
        --ow-fs-eyebrow:        11px;
        --ow-fs-meta:           12px;
        --ow-fs-small:          13px;
        --ow-fs-body:           14px;
        --ow-fs-strong:         16px;
        --ow-fs-card-title:     17px;
        --ow-fs-stat-num:       22px;
        --ow-fs-section-title:  26px;
        --ow-fs-display:        clamp(40px, 6.5vw, 64px);
      }

      /* v5.89.24: single-font discipline. Every dollar amount in the buyer
         report renders in DM Sans (inherited from body) using tabular-nums
         for column alignment. Previously these used a monospace stack
         (`ui-monospace, SFMono-Regular, Menlo, monospace`) which gave the
         report a slight fintech-dashboard feel — visually a separate
         typeface from the body. Now everything is one type voice; tabular
         numerals keep the Math table aligned without breaking visual
         cohesion. Monospace stays in one place only: the .ow-ask DRAFT
         blockquote, where the mono treatment signals "paste-ready code". */
      .ow-num {
        font-variant-numeric: tabular-nums;
        font-feature-settings: "tnum" 1;
        letter-spacing: -0.005em;
      }

        // v5.89.187 — Report tab bar. Self-contained: own state, no coupling to

        // data-tab; CSS (above) keys section visibility off that attribute. If
        // anything here fails, data-tab is never set and the full report shows.
        function OwReportTabs() {
          const TABS = [['price','Price'],['condition','Condition'],['disclosures','Disclosures'],['negotiate','Negotiate']];
          const [tab, setTab] = useState('price');
          const ref = React.useRef(null);
          React.useLayoutEffect(() => {
            try {
              let el = ref.current;
              while (el && !(el.classList && el.classList.contains('ow-results'))) el = el.parentElement;
              if (el) el.setAttribute('data-tab', tab);
            } catch (e) {}
          }, [tab]);
          return (
            <div ref={ref} className="ow-report-tabs" role="tablist">
              {TABS.map(([key, label]) => (
                <button
                  key={key}
                  role="tab"
                  aria-selected={tab === key}
                  className={'ow-report-tab' + (tab === key ? ' is-active' : '')}
                  onClick={() => setTab(key)}
                >{label}</button>
              ))}
            </div>
          );
        }

        // v5.89.191 — Report light/dark toggle. Self-contained, opt-in, persisted.
        // v5.89.222 — Hero CTAs ("Send to my agent", "Should I walk away?") point at
        // sections that live under the Negotiate tab and are display:none on other
        // tabs, so a plain anchor jump silently did nothing. Activate the Negotiate
        // tab via its real button (updates React tab state -> data-tab -> CSS reveals
        // the section), then scroll to the target once it's visible.
        function owJumpToNegotiate(targetId) {
          try {
            var ts = document.querySelectorAll('.ow-report-tab');
            for (var i = 0; i < ts.length; i++) {
              if (ts[i].textContent.trim() === 'Negotiate') { ts[i].click(); break; }
            }
          } catch (e) {}
          setTimeout(function () {
            var el = document.getElementById(targetId);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 60);
        }

        // Default report theme is DARK, always (v5.89.220). Light is a per-session
        // toggle and is intentionally NOT persisted, so every report opens dark

        // never set and the report stays dark anyway (the token defaults).
        function OwThemeToggle() {
          const [light, setLight] = useState(false);
          const ref = React.useRef(null);
          React.useLayoutEffect(() => {
            try {
              let el = ref.current;
              while (el && !(el.classList && el.classList.contains('ow-results'))) el = el.parentElement;
              if (el) el.setAttribute('data-theme', light ? 'light' : 'dark');
            } catch(e) {}
          }, [light]);
          return (
            <button ref={ref} className="ow-theme-toggle" onClick={() => setLight(v => !v)} title="Toggle light / dark report">

            try {
              // Read File object as ArrayBuffer
              const arrayBuffer = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(pdfFile);
              });
              
              // Load PDF with PDF.js (runs in browser!)
              const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
              
              if (pageNum < 1 || pageNum > pdf.numPages) {
                throw new Error(`Invalid page number. Document has ${pdf.numPages} pages.`);
              }
              
              // Get the specific page
              const page = await pdf.getPage(pageNum);
              
              // Set up canvas for rendering
              const scale = 2.0; // Higher quality for highlighting
              const viewport = page.getViewport({ scale });
              
              const canvas = document.createElement('canvas');
              const context = canvas.getContext('2d');
              canvas.width = viewport.width;
              canvas.height = viewport.height;
              
              // Render the page to canvas
              await page.render({
                canvasContext: context,
                viewport: viewport
              }).promise;
              
              // If we have a quote, try to highlight it
              if (quote && quote.length > 10) {
                try {
                  const textContent = await page.getTextContent();
                  const textItems = textContent.items;
                  
                  // Normalize quote for matching
                  const normalizedQuote = quote.toLowerCase().replace(/\s+/g, ' ').trim();
                  const searchTerms = normalizedQuote.split(' ').filter(t => t.length > 3).slice(0, 5);
                  
                  // Find matching text items
                  let matchedItems = [];
                  let fullText = '';
                  let itemPositions = [];
                  
                  // Build full text and track positions
                  textItems.forEach((item, idx) => {
                    if (item.str) {
                      itemPositions.push({ start: fullText.length, end: fullText.length + item.str.length, idx });
                      fullText += item.str + ' ';
                    }
                  });
                  
                  const normalizedFullText = fullText.toLowerCase();
                  
                  // Find where search terms appear
                  searchTerms.forEach(term => {
                    let pos = normalizedFullText.indexOf(term);
                    while (pos !== -1) {
                      // Find which text item this belongs to
                      itemPositions.forEach(ip => {
                        if (pos >= ip.start && pos < ip.end) {
                          if (!matchedItems.includes(ip.idx)) {
                            matchedItems.push(ip.idx);
                          }
                        }
                      });
                      pos = normalizedFullText.indexOf(term, pos + 1);
                    }
                  });
                  
                  // Draw highlights on matched items
                  if (matchedItems.length > 0) {
                    context.save();
                    context.globalAlpha = 0.35;
                    context.fillStyle = '#fbbf24'; // Yellow highlight
                    
                    matchedItems.forEach(idx => {
                      const item = textItems[idx];
                      if (item && item.transform) {
                        const tx = item.transform;
                        // PDF.js transform: [scaleX, skewX, skewY, scaleY, translateX, translateY]
                        const x = tx[4] * scale;
                        const y = canvas.height - (tx[5] * scale) - (item.height || 12) * scale;
                        const width = item.width ? item.width * scale : item.str.length * 8 * scale;
                        const height = (item.height || 14) * scale;
                        
                        context.fillRect(x - 2, y - 2, width + 4, height + 4);
                      }
                    });
                    
                    context.restore();
                    console.log(`✅ Highlighted ${matchedItems.length} text regions`);
                  } else {

                      system: typeof cs.category === 'object' ? (cs.category.value || cs.category) : cs.category,
                      avg, low, high,
                      severity: cs.score >= 70 ? 'critical' : cs.score >= 40 ? 'major' : 'minor',
                      description: (cs.key_issues || []).slice(0,2).join(' · '),

                      insurability: cs.affects_insurability || false,
                      specialist: cs.requires_specialist || false,
                      severityBreakdown: cs.severity_breakdown || {},
                    });

                  if (avg > 0) repairBreakdown.push({ system: sys, avg });
                });

              const maxRepair = repairBreakdown.length > 0 ? Math.max(...repairBreakdown.map(r => r.avg)) : 1;

                      {/* v5.89.7: Mockup-design stylesheet for the paid

                                        </div>

                                    })}
                                    <div style={{ fontSize: 'var(--ow-fs-micro)', color:'var(--ow-muted-dim)', fontWeight:500, marginTop:'10px', textAlign:'center' }}>Higher = greater risk · Patent Pending</div>

                            const discDetail = (discItem.details || '').trim();
                            const sellerSaid = discDetail || (discQ ? `"${discQ}" — answered no` : `No ${category || 'issue'} disclosed`);
                            const costLow  = finding.estimated_cost_low || finding.cost_low || 0;
                            const costHigh = finding.estimated_cost_high || finding.cost_high || 0;
                            const costRange = (costLow && costHigh) ? `$${costLow.toLocaleString()}–$${costHigh.toLocaleString()}` : '';
                            // Fallback: if no finding.description (older data shape),
                            // fall back to the legacy explanation rendering
                            if (!findingDesc) {
                              const fallback = c.explanation || c.detail || c.description || c.contradiction || c.summary || (typeof c === 'string' ? c : 'Contradiction found');
                              return <Finding key={idx} color={sevColor} text={fallback} />;

                                <div style={{ display:'grid', gridTemplateColumns:'auto 1fr', gap:'4px 12px', fontSize: 'var(--ow-fs-small)', lineHeight:1.5 }}>

                                  <div style={{ color:'var(--ow-text-2)' }}>{findingDesc}</div>
                                </div>
                              </div>
                            );
                          })}
                          {confirmed.slice(0,3).map((c, idx) => (
                            <Finding key={`conf-${idx}`} color='#22c55e' text={typeof c === 'string' ? c : (c.explanation || c.description || c.detail || c.summary || 'Confirmed consistent')} />
                          ))}
                        </div>
                      </ECard>
                      </div>
                      );
                    })()}

                                  <div style={{ background:'rgba(15,23,42,0.5)', border:'1px solid rgba(51,65,85,0.3)', borderRadius:'8px', padding:'12px 14px' }}>
                                    <div style={{ fontSize: 'var(--ow-fs-eyebrow)', color:'var(--ow-muted-dim)', marginBottom:'3px' }}>Comp Avg Days to Sell</div>
                                    <div style={{ fontSize: 'var(--ow-fs-card-title)', fontWeight:700, color:'var(--ow-text-2)' }}>{compAvgDom} days</div>
                                  </div>

                              </div>
                            </div>

                          {/* Trend indicators */}
                          {(priceTrend !== 0 || inventoryTrend !== 0) && (
                            <div style={{ display:'flex', gap:'10px', flexWrap:'wrap', marginBottom:'14px' }}>
                              {priceTrend !== 0 && (
                                <div style={{ display:'flex', alignItems:'center', gap:'6px', padding:'7px 12px', borderRadius:'20px', background: priceTrend > 0 ? 'rgba(239,68,68,0.08)' : 'rgba(34,197,94,0.08)', border:`1px solid ${priceTrend > 0 ? 'rgba(239,68,68,0.2)' : 'rgba(34,197,94,0.2)'}` }}>

                                  <span style={{ fontSize: 'var(--ow-fs-small)' }}>⚠️</span>
                                  <span style={{ fontSize: 'var(--ow-fs-meta)', fontWeight:600, color:'#f59e0b' }}>
                                    {Math.round(distressedPct)}% distressed sales in comps

                            </div>

                          {/* Market rationale */}

                          {/* Individual comparable sales from RentCast */}
                          {(() => {
                            const comps = result?.research_data?.profile?.comparables || result?.research_data?.tool_results?.find(t => t.tool_name === 'rentcast')?.data?.comparables || [];

                                    return (

                    {/* v5.89.1: Walk section — woven design step 4.
                        Gives the buyer explicit permission to walk away,
                        with specific conditions tailored to this property.
                        Property Strengths (which used to live at the bottom
                        as its own card) folds in here as subordinated
                        positives — they're real value but they don't change
                        the recommended offer or the walk decision.

                        Why "permission to walk" matters: most buyers
                        overpay because they fall in love with a house and
                        nobody tells them walking is acceptable. OfferWise™
                        should be that voice. */}
                    {userHasPaid && (() => {
                      const _topRepair = (repairBreakdown || [])[0];
                      const _walkAwayPrice = offer_strategy?.walk_away_price || (recOffer ? Math.round(recOffer * 1.08) : null);
                      const _conOfferLocal = offer_strategy?.conservative_offer || (recOffer && askingPrice > 0 ? Math.round(recOffer + (askingPrice - recOffer) * 0.4) : null);
                      const _ceiling = _conOfferLocal || _walkAwayPrice;
                      const _hasContradictions = (contradictions?.length || 0) >= 3;
                      const _needsSpecialist = (repairBreakdown || []).some(r => r.specialist);

                      // Build walk conditions tailored to actual findings.
                      // We always show 3-4 conditions. If the verdict is
                      // already "Walk Away" the framing shifts from
                      // "conditions under which to walk" to "reasons we said
                      // walk."
                      const _conditions = [];
                      if (_topRepair && _topRepair.system) {
                        _conditions.push({
                          headline: `If the seller refuses repair credit on the ${_topRepair.system.toLowerCase()} findings.`,
                          detail: `This is the highest-cost system in this report ($${_topRepair.low?.toLocaleString() || '—'}–$${_topRepair.high?.toLocaleString() || '—'}). A credit at closing is more flexible than a "complete before close" demand, but it's not optional.`,
                        });
                      }
                      if (_needsSpecialist) {
                        _conditions.push({
                          headline: `If the seller refuses to extend the inspection contingency for a specialist review.`,
                          detail: `${(repairBreakdown || []).filter(r => r.specialist).map(r => r.system).slice(0, 2).join(' and ')} findings need a $400–$600 specialist opinion before you commit. Refusing a 7–10 day extension is a signal.`,
                        });
                      }
                      if (_ceiling) {
                        _conditions.push({
                          headline: `If their counter lands above $${_ceiling.toLocaleString()}.`,
                          detail: `The data in this report — repair costs, hidden-issue reserve, disclosure gaps, and market comps — doesn't support paying more than that. At higher prices the deal stops being defensible.`,
                        });
                      }
                      if (_hasContradictions) {
                        _conditions.push({
                          headline: `If three or more disclosure omissions stay uncorrected after a written response.`,
                          detail: `Found ${contradictions.length} omissions in this disclosure. If multiple of them go unaddressed in negotiation, that's a pattern of bad faith — not oversight.`,
                        });
                      }
                      // If we somehow have no conditions, don't render an
                      // empty section.
                      if (_conditions.length === 0) return null;

                      const _isWalkVerdict = (dealBreakers.length >= 3) || (offerScoreValue < 25);

                      return (
                        <div id="ow-walk" style={{ margin:'24px 0 0' }}>
                          {/* v5.89.19: now a <details> element so the
                              section is collapsible. Title moves into the
                              <summary>. Card chrome is the same neutral
                              .ow-panel slate Market Context and the other
                              section cards use — the red wash was
                              dropped. Closed by default. */}
                          <details>
                            <summary style={{
                              cursor:'pointer', listStyle:'none',
                              display:'flex', alignItems:'center', gap:'12px',
                              padding:'18px 22px',
                              background:'var(--ow-panel)',
                              border:'1px solid var(--ow-line)',
                              borderRadius:'14px',
                              marginBottom:'0',
                            }}>
                              <h2 className="ow-section-title" style={{ fontSize: 'var(--ow-fs-section-title)', margin:0, flex:1 }}>
                                {_isWalkVerdict ? 'Why we said walk' : 'What could make you walk'}
                              </h2>
                              <span className="ow-expand-chevron">▾</span>

        // Error Boundary Component
        class ErrorBoundary extends React.Component {
          constructor(props) {
            super(props);
            this.state = { hasError: false, error: null, errorInfo: null };
          }
          
          static getDerivedStateFromError(error) {
            return { hasError: true };
          }
          
          componentDidCatch(error, errorInfo) {
            console.error('React Error Boundary caught:', error, errorInfo);
            this.setState({ error, errorInfo });
          }
          
          render() {
            if (this.state.hasError) {
              return (
                <div style={{
                  maxWidth: '600px',
                  margin: '40px auto',
                  padding: '20px',
                  fontFamily: 'system-ui, sans-serif'
                }}>
                  <h1 style={{color: '#d32f2f'}}>Something went wrong</h1>
                  <p>The app encountered an error. Please refresh the page and try again.</p>
                  <details style={{marginTop: '20px', fontSize: '14px'}}>
                    <summary style={{cursor: 'pointer'}}>Error Details</summary>
                    <pre style={{
                      backgroundColor: '#f5f5f5',
                      padding: '12px',
                      borderRadius: '4px',
                      overflow: 'auto',
                      fontSize: '12px',
                      marginTop: '12px'
                    }}>
                      {this.state.error && this.state.error.toString()}
                      {'\n\n'}
                      {this.state.errorInfo && this.state.errorInfo.componentStack}
                    </pre>
                  </details>
                  <button
                    onClick={() => window.location.reload()}
                    style={{
                      marginTop: '20px',
                      padding: '12px 24px',
                      backgroundColor: '#000',
                      color: '#fff',
                      border: 'none',
                      borderRadius: '4px',
                      cursor: 'pointer',
                      fontSize: '16px'
                    }}
                  >
                    Refresh Page
                  </button>
                </div>
              );
            }
            
            return this.props.children;
          }
        }

        window._owDownloadAddendum = function() {
            window.owTrack("addendum_download", "download");
            var text = window._owAddendumText || '';
            var title = window._owAddendumTitle || 'Request for Repair';
            var dateStr = new Date().toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});

            // Strip any residual markdown characters the model may have snuck in
            function stripMd(s) {
                return s
                    .replace(/\*\*(.*?)\*\*/g, '$1')   // bold
                    .replace(/\*(.*?)\*/g, '$1')         // italic
                    .replace(/^#+\s*/gm, '')              // headers
                    .replace(/^[-*]\s+/gm, '')            // bullets
                    .replace(/`/g, '')                    // code
                    .replace(/_{2,}/g, '');               // underlines
            }

            // Typeset the document into clean HTML
            function renderDoc(raw) {
                var lines = stripMd(raw).split('\n');
                var html = '';
                var inClause = false;

                lines.forEach(function(line) {
                    var t = line.trim();
                    if (!t) {
                        html += '<div style="height:10px"></div>';
                        return;
                    }

                    // Document title (all caps, no colon, short)
                    if (/^REQUEST FOR REPAIR$/.test(t) || /^REQUEST FOR REPAIRS$/.test(t)) {
                        html += '<h1 style="font-size:22px;font-weight:700;letter-spacing:-0.01em;color:#0f172a;margin:0 0 6px;text-align:center;">' + t + '</h1>';
                        return;
                    }

                    // Section header: ALL CAPS ending in colon
                    if (/^[A-Z][A-Z\s\-\']{3,}:$/.test(t)) {
                        html += '<div style="font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#475569;margin:28px 0 8px;padding-bottom:5px;border-bottom:1px solid #cbd5e1;">' + t.replace(/:$/, '') + '</div>';
                        return;
                    }

                    // Key-value header lines (Property:, Buyer:, Date:, etc.)
                    var kvMatch = t.match(/^([A-Za-z][A-Za-z\s]{1,30}):(.+)$/);
                    if (kvMatch && t.split(':').length === 2) {
                        html += '<div style="font-size:12px;color:#1e293b;line-height:1.7;margin:2px 0;">'
                              + '<span style="font-weight:600;min-width:180px;display:inline-block;">' + kvMatch[1] + ':</span>'
                              + '<span style="color:#334155;">' + kvMatch[2].trim() + '</span></div>';
                        return;
                    }

                    // Numbered clause (1., 2., etc.)
                    var clauseMatch = t.match(/^(\d+)\.\s+(.+)$/);
                    if (clauseMatch) {
                        html += '<div style="display:flex;gap:12px;margin:12px 0 4px;padding:14px 16px;background:#f8fafc;border-left:3px solid #334155;border-radius:0 6px 6px 0;">'
                              + '<span style="font-size:12px;font-weight:700;color:#0f172a;min-width:18px;flex-shrink:0;">' + clauseMatch[1] + '.</span>'
                              + '<span style="font-size:12px;line-height:1.75;color:#1e293b;">' + clauseMatch[2] + '</span>'
                              + '</div>';
                        return;
                    }

                    // Signature line
                    if (/^(Buyer|Seller|Agent):\s*_{3,}/.test(t) || /^_{10,}/.test(t)) {
                        html += '<div style="font-size:12px;color:#1e293b;line-height:2.2;margin:4px 0;font-family:Georgia,serif;">' + t + '</div>';
                        return;
                    }

                    // Regular paragraph
                    html += '<p style="font-size:12px;line-height:1.8;color:#334155;margin:6px 0;">' + t + '</p>';
                });

                return html;
            }

            var body = renderDoc(text);

            var css = ''
                + '* { box-sizing:border-box; margin:0; padding:0; }'
                + 'body { font-family: "Georgia", "Times New Roman", serif; background:#fff; color:#1e293b;'
                + '       padding:64px 80px; max-width:780px; margin:0 auto; }'
                + '.doc-header { display:flex; justify-content:space-between; align-items:flex-start;'
                + '              border-bottom:2px solid #0f172a; padding-bottom:18px; margin-bottom:32px; }'
                + '.doc-header-left { }'
                + '.doc-header-brand { font-size:11px; font-weight:700; letter-spacing:0.12em;'
                + '                   text-transform:uppercase; color:#64748b; margin-bottom:4px; }'
                + '.doc-header-date  { font-size:11px; color:#94a3b8; }'
                + '.doc-footer { margin-top:56px; padding-top:14px; border-top:1px solid #e2e8f0;'
                + '              font-size:9px; color:#94a3b8; line-height:1.6; }'
                + '@media print {'
                + '  body { padding:48px 64px; }'
                + '  @page { margin:0.8in; size:letter; }'
                + '  .doc-header { page-break-after:avoid; }'
                + '  div[style*="background:#f8fafc"] { page-break-inside:avoid; }'
                + '}';

            var printWindow = window.open('', '_blank', 'width=860,height=1100');
            if (!printWindow) { alert('Please allow popups to download the PDF.'); return; }

            var html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>' + title + '</title>'
                + '<style>' + css + '</style></head><body>'
                + '<div class="doc-header">'
                + '  <div class="doc-header-left">'
                + '    <div class="doc-header-brand">OfferWise\u2122</div>'
                + '    <div class="doc-header-date">' + dateStr + '</div>'
                + '  </div>'
                + '</div>'
                + body
                + '<div class="doc-footer">'
                + 'This document is prepared from documented inspection findings. Review with your licensed real estate agent or attorney before submission. &nbsp;|&nbsp; getofferwise.ai'
                + '</div>'
                + '</body></html>';

            printWindow.document.write(html);
            printWindow.document.close();
            printWindow.focus();
            setTimeout(function() { printWindow.print(); }, 500);
        };

        // ── Universal email send — opens correct compose window per provider ──
        window._owSendEmail = function(subject, body, provider) {
            var s = encodeURIComponent(subject || '');
            var b = encodeURIComponent(body || '');
            var url;
            if (provider === 'gmail') {
                url = 'https://mail.google.com/mail/?view=cm&fs=1&su=' + s + '&body=' + b;
            } else if (provider === 'outlook') {
                url = 'https://outlook.live.com/mail/0/deeplink/compose?subject=' + s + '&body=' + b;
            } else if (provider === 'yahoo') {
                url = 'https://compose.mail.yahoo.com/?subject=' + s + '&body=' + b;
            } else {
                url = 'mailto:?subject=' + s + '&body=' + b;
            }
            window.open(url, '_blank');
        };

        // ── One-click Gmail send via MCP ─────────────────────────────
        window._owSendViaGmail = async function() {
            var btn = document.getElementById('ow-obj-send-btn');
            var toEmail = (window._owAgentEmail || '').trim();
            var analysisId = window._owCurrentAnalysisId;
            var subject = window._owLetterSubject || '';
            var body = window._owLetterText || '';

            if (!toEmail || !toEmail.includes('@')) {
                // Fall back to browser-compose if no email entered
                window._owSendEmail(subject, body, 'gmail');
                return;
            }

            if (btn) { btn.disabled = true; btn.textContent = '⏳ Sending…'; btn.style.opacity = '0.7'; }
            try {
                var res = await fetch('/api/mcp/gmail/send-objection', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        analysis_id: analysisId,
                        to_email: toEmail,
                        to_name: (window._owAgentName || '').trim(),
                        style: window._owObjStyle || 'balanced'
                    })
                });
                var data = await res.json();
                if (data.success) {
                    if (btn) {
                        btn.textContent = '✅ Sent!';
                        btn.style.background = 'rgba(34,197,94,0.15)';
                        btn.style.borderColor = 'rgba(34,197,94,0.5)';
                        btn.style.color = '#4ade80';
                        btn.disabled = true;
                    }
                    window.owTrack && window.owTrack('objection_letter_sent', 'gmail_mcp');
                } else {
                    // MCP failed — fall back to browser compose
                    if (btn) { btn.disabled = false; btn.textContent = '⚡ Send via Gmail'; btn.style.opacity = '1'; }
                    var errMsg = data.error || 'Send failed — opening Gmail to send manually.';
                    if (errMsg.indexOf('connect') !== -1 || errMsg.indexOf('Gmail') !== -1 || errMsg.indexOf('auth') !== -1) {
                        errMsg = 'Gmail not connected — opening compose window instead.';
                    }
                    alert(errMsg + '\n\nOpening Gmail compose…');
                    window._owSendEmail(subject, body, 'gmail');

        window.owCalcUpdate = function(input, asking) {
            const credit = parseFloat(input.value) || 0;
            const myOffer = Math.max(0, asking - credit);
            const saved = asking - myOffer;
            const pct = asking > 0 ? ((saved / asking) * 100).toFixed(1) : '0.0';
            const fmt = (n) => '$' + Math.round(n).toLocaleString();
            const el = (id) => document.getElementById(id);
            if (el('ow-calc-offer'))   el('ow-calc-offer').textContent   = fmt(myOffer);
            if (el('ow-calc-savings')) el('ow-calc-savings').textContent = saved > 0 ? fmt(saved) + ' below asking' : 'At asking price';
            if (el('ow-calc-pct'))     el('ow-calc-pct').textContent     = pct + '% discount';
            if (el('ow-calc-credit-display'))  el('ow-calc-credit-display').textContent  = fmt(credit);
            if (el('ow-calc-credit-display2')) el('ow-calc-credit-display2').textContent = fmt(credit);
        };

        // Professional Print Report Generator (v5.59.28)

            else if (compositeScore >= 60) { riskTier = 'ELEVATED'; riskColor = '#b45309'; riskColorLight = '#fde68a'; riskBadgeBg = '#fffbeb'; }
            else if (compositeScore >= 40) { riskTier = 'MODERATE'; riskColor = '#a16207'; riskColorLight = '#fef08a'; riskBadgeBg = '#fefce8'; }
            else if (compositeScore >= 20) { riskTier = 'LOW'; riskColor = '#15803d'; riskColorLight = '#bbf7d0'; riskBadgeBg = '#f0fdf4'; }
            else { riskTier = 'MINIMAL'; riskColor = '#047857'; riskColorLight = '#a7f3d0'; riskBadgeBg = '#ecfdf5'; }

            const reportTime = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
            const reportId = 'OW-' + Date.now().toString(36).toUpperCase();

            // v5.89.4: build the risk pentagon SVG. Buyers reviewing the

            //
            // SVG geometry: viewBox 220x220, center (110,110), max radius 88.
            // Vertex 0 is at top (angle = -90°), then going clockwise every 72°.
            // Each axis vertex is plotted at distance (score/100) * 88 from center.
            const _dnaPenta = (() => {
                const cx = 110, cy = 110, R = 88;
                const angle = (i) => (i * 72 - 90) * Math.PI / 180;
                const vertex = (i, r) => {
                    const a = angle(i);
                    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
                };
                const ringPts = (scale) => [0,1,2,3,4].map(i => {

                    const [x,y] = vertex(i, R * Math.max(0, Math.min(100, s.score)) / 100);

            // ---- HERO PENTAGON (Property Risk DNA visual) ----

            // of the property's risk profile across the 5 DNA axes:
            // Structural, Building Systems, Seller Transparency,
            // Temporal Risk, Financial Exposure. Each axis is scored
            // 0-100; we plot each vertex at (score/100) * radius from
            // center. The polygon fills with amber when most axes are
            // in elevated-risk territory.
            //
            // SVG geometry: 220x220 viewBox, center (110,110), max
            // radius 88. Vertex 0 is at top (angle = -90 deg), then
            // clockwise every 72 deg. Only render when we have at
            // least one non-zero score.
            const _buildPentagon = () => {
              const dnaScores = [
                { name: 'Structural',   score: Number(riskDna.structural_score)   || 0 },
                { name: 'Systems',      score: Number(riskDna.systems_score)      || 0 },
                { name: 'Transparency', score: Number(riskDna.transparency_score) || 0 },

              const hasScores = dnaScores.some(s => s.score > 0);
              if (!hasScores) return '';

              const cx = 110, cy = 110, R = 88;
              const ang = (i) => (i * 72 - 90) * Math.PI / 180;
              const vertex = (i, r) => {
                const a = ang(i);
                return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
              };
              const ringPts = (scale) => [0,1,2,3,4].map(i => {
                const [x, y] = vertex(i, R * scale);
                return x.toFixed(1) + ',' + y.toFixed(1);
              }).join(' ');
              const scorePts = dnaScores.map((s, i) => {
                const safeScore = Math.max(0, Math.min(100, s.score));
                const [x, y] = vertex(i, R * safeScore / 100);
                return x.toFixed(1) + ',' + y.toFixed(1);
              }).join(' ');
              const spokes = [0,1,2,3,4].map(i => {
                const [x, y] = vertex(i, R);
                return '<line x1="' + cx + '" y1="' + cy + '" x2="' + x.toFixed(1) + '" y2="' + y.toFixed(1) + '" stroke="rgba(138,153,184,0.32)" stroke-width="1"/>';
              }).join('');
              const dots = dnaScores.map((s, i) => {
                const safeScore = Math.max(0, Math.min(100, s.score));
                const [x, y] = vertex(i, R * safeScore / 100);
                // Score thresholds: >= 60 high risk red, >= 30 mid amber, else green
