<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfferWise AI - Property Analysis</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes shine {
        0% { left: -100%; }
        100% { left: 100%; }
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
      }
      
      /* Mobile Responsiveness - Added for Launch */
      @media (max-width: 768px) {
        /* Reduce padding on mobile */
        body {
          font-size: 14px;
        }
        
        /* Make containers full width with less padding */
        [style*="max-width: 600px"],
        [style*="max-width: 800px"],
        [style*="max-width: 1200px"] {
          max-width: 100% !important;
          padding-left: 12px !important;
          padding-right: 12px !important;
        }
        
        /* Make buttons full width on mobile */
        button {
          width: 100% !important;
          padding: 14px !important;
          font-size: 16px !important;
        }
        
        /* Make input fields full width */
        input[type="text"],
        input[type="file"] {
          width: 100% !important;
          font-size: 16px !important; /* Prevents zoom on iOS */
        }
        
        /* Adjust title sizes */
        h1 {
          font-size: 24px !important;
        }
        
        h2 {
          font-size: 20px !important;
        }
        
        h3 {
          font-size: 18px !important;
        }
        
        /* Make progress bars more touch-friendly */
        [style*="height: '24px'"] {
          height: 32px !important;
        }
        
        /* Reduce margins on mobile */
        [style*="margin-bottom: '40px'"] {
          margin-bottom: 20px !important;
        }
        
        /* Make cards stack on mobile */
        [style*="display: 'flex'"][style*="gap"] {
          flex-direction: column !important;
        }
        
        /* Adjust debug panel on mobile */
        [style*="backgroundColor: '#fef3c7'"] {
          font-size: 11px !important;
          padding: 8px !important;
        }
      }
      
      /* Tablet adjustments */
      @media (min-width: 769px) and (max-width: 1024px) {
        [style*="max-width: 1200px"] {
          max-width: 900px !important;
        }
      }
      
      /* Ensure touch targets are large enough */
      @media (hover: none) and (pointer: coarse) {
        button, input, select, textarea {
          min-height: 44px !important;
        }
      }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const OfferWise = () => {
          const [currentStep, setCurrentStep] = useState('loading'); // Start with loading
          const [propertyData, setPropertyData] = useState({});
          const [buyerProfile, setBuyerProfile] = useState({});
          const [result, setResult] = useState(null);
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState('');
          const [hasProfile, setHasProfile] = useState(false);
          // const [showRepairCalculation, setShowRepairCalculation] = useState(false); // Removed for IP protection
          
          // Analysis progress state (shared between PropertyDocumentsStep and AnalyzeStep)
          const [analysisProgress, setAnalysisProgress] = useState({ current: 0, total: 0, message: '' });
          
          // Collapsible section states for patent explanations
          const [showRepairExplanation, setShowRepairExplanation] = useState(false);
          const [showRiskPremiumExplanation, setShowRiskPremiumExplanation] = useState(false);
          const [showTransparencyExplanation, setShowTransparencyExplanation] = useState(false);
          const [showTermsModal, setShowTermsModal] = useState(false);
          const [termsAccepted, setTermsAccepted] = useState(false);
          
          // Check if user has accepted terms
          useEffect(() => {
            fetch('/api/check-terms')
              .then(res => res.json())
              .then(data => {
                if (!data.accepted) {
                  setShowTermsModal(true);
                } else {
                  setTermsAccepted(true);
                }
              })
              .catch(err => {
                console.error('Error checking terms:', err);
                // If error, assume terms not accepted
                setShowTermsModal(true);
              });
          }, []);
          
          const handleAcceptTerms = () => {
            fetch('/api/accept-terms', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              }
            })
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                setShowTermsModal(false);
                setTermsAccepted(true);
              } else {
                alert('Error accepting terms. Please try again.');
              }
            })
            .catch(err => {
              console.error('Error accepting terms:', err);
              alert('Error accepting terms. Please try again.');
            });
          };
          
          // Check credits before allowing analysis to start
          const checkCreditsAndStartAnalysis = async () => {
            try {
              const response = await fetch('/api/user/credits');
              if (!response.ok) {
                throw new Error('Failed to fetch credits');
              }
              const data = await response.json();
              const credits = data.credits || 0;
              
              if (credits === 0) {
                // No credits - redirect to pricing
                console.log('🚫 No credits available - redirecting to pricing');
                window.location.href = '/pricing?message=' + encodeURIComponent('You need to purchase credits before starting a new analysis.');
                return false;
              }
              
              // Has credits - allow to continue
              console.log(`✅ User has ${credits} credits - allowing analysis`);
              setCurrentStep('property');
              return true;
            } catch (error) {
              console.error('❌ Error checking credits:', error);
              // On error, still allow (fail open)
              setCurrentStep('property');
              return true;
            }
          };
          
          // Check for profile and determine initial step on mount
          useEffect(() => {
            const checkProfileAndLoadData = () => {
              // Check for loaded analysis from dashboard first
              const loadedAnalysis = sessionStorage.getItem('loaded_analysis');
              if (loadedAnalysis) {
                try {
                  const analysisData = JSON.parse(loadedAnalysis);
                  
                  console.log('Loading analysis from dashboard:', analysisData);
                  
                  // Set property data
                  if (analysisData.property_address && analysisData.property_price) {
                    setPropertyData({
                      address: analysisData.property_address,
                      price: analysisData.property_price
                    });
                  }
                  
                  // Set result to display the analysis
                  setResult(analysisData);
                  setCurrentStep('results');
                  
                  // Clear from sessionStorage
                  sessionStorage.removeItem('loaded_analysis');
                  return;
                } catch (e) {
                  console.error('Error loading saved analysis:', e);
                }
              }
              
              // Check for temp property data (saved when user went to update preferences)
              const tempPropertyData = localStorage.getItem('temp_property_data');
              if (tempPropertyData) {
                try {
                  const restored = JSON.parse(tempPropertyData);
                  console.log('Restoring property data after profile update:', restored);
                  setPropertyData(restored);
                  // Clear temp data
                  localStorage.removeItem('temp_property_data');
                  
                  // CRITICAL FIX: Also load the buyer profile from localStorage
                  const savedProfile = localStorage.getItem('buyer_profile');
                  if (savedProfile) {
                    const profile = JSON.parse(savedProfile);
                    console.log('✅ Loading buyer profile after returning from profile page:', profile);
                    const maxBudget = profile.max_budget ? parseInt(profile.max_budget) : 0;
                    setBuyerProfile({
                      max_budget: maxBudget,
                      repair_tolerance: profile.repair_tolerance || 'moderate',
                      biggest_regret: profile.biggest_regret || ''
                    });
                  }
                  
                  // Set to analysis step so user can continue where they left off
                  setCurrentStep('analysis');
                  setHasProfile(true);
                  return;
                } catch (e) {
                  console.error('Error restoring temp property data:', e);
                }
              }
              
              // Check if buyer profile exists
              const savedProfile = localStorage.getItem('buyer_profile');
              if (savedProfile) {
                try {
                  const profile = JSON.parse(savedProfile);
                  console.log('=== LOADING BUYER PROFILE IN APP ===');
                  console.log('Saved profile:', profile);
                  console.log('max_budget from profile:', profile.max_budget);
                  console.log('max_budget type:', typeof profile.max_budget);
                  
                  // Ensure max_budget is a number
                  const maxBudget = profile.max_budget ? parseInt(profile.max_budget) : 0;
                  console.log('Parsed max_budget:', maxBudget);
                  
                  setBuyerProfile({
                    max_budget: maxBudget,  // Always store as number
                    repair_tolerance: profile.repair_tolerance || 'moderate',
                    biggest_regret: profile.biggest_regret || ''
                  });
                  setHasProfile(true);
                  console.log('✅ Loaded buyer profile');
                  setCurrentStep('property'); // Go to property step
                } catch (e) {
                  console.error('❌ Error loading saved profile:', e);
                  setHasProfile(false);
                  setCurrentStep('first-time-profile'); // Show profile setup
                }
              } else {
                // No profile - show first-time profile setup
                console.log('No saved profile found');
                setHasProfile(false);
                setCurrentStep('first-time-profile');
              }
            };
            
            checkProfileAndLoadData();
          }, []);
          
          // Combined Property & Documents Step
          
          // Function to save completed analysis to localStorage
          const saveAnalysisToHistory = (analysisResult, propertyData, buyerProfile) => {
            try {
              // Get existing history
              const history = JSON.parse(localStorage.getItem('analysis_history') || '[]');
              
              // Extract risk score - it might be an object with overall_risk_score property
              const riskScore = typeof analysisResult.risk_score === 'object' 
                ? (analysisResult.risk_score.overall_risk_score || analysisResult.risk_score.buyer_adjusted_score || 0)
                : analysisResult.risk_score;
              
              // Extract risk level/tier
              const riskLevel = typeof analysisResult.risk_score === 'object'
                ? (analysisResult.risk_score.risk_tier || analysisResult.risk_level || 'UNKNOWN')
                : (analysisResult.risk_level || 'UNKNOWN');
              
              // Create analysis record
              const analysisRecord = {
                id: Date.now() + '-' + Math.random().toString(36).substr(2, 9),
                analyzed_at: new Date().toISOString(),
                property_address: propertyData.address,
                asking_price: parseFloat(propertyData.price),
                risk_score: Math.round(parseFloat(riskScore)),  // Round to whole number
                // Extract recommended_offer from nested offer_strategy object
                recommended_offer: analysisResult.offer_strategy?.recommended_offer || 
                                   analysisResult.recommended_offer ||
                                   parseFloat(propertyData.price),
                // Calculate potential savings correctly
                potential_savings: parseFloat(propertyData.price) - 
                                   (analysisResult.offer_strategy?.recommended_offer || 
                                    analysisResult.recommended_offer ||
                                    parseFloat(propertyData.price)),
                discount_percentage: analysisResult.offer_strategy?.discount_percentage || 
                                     analysisResult.discount_percentage || 0,
                risk_level: riskLevel,
                buyer_budget: buyerProfile.max_budget,
                repair_tolerance: buyerProfile.repair_tolerance,
                // Store full result for viewing later
                full_result: analysisResult,
                property_data: propertyData,
                buyer_profile: buyerProfile
              };
              
              // Add to beginning of array (most recent first)
              history.unshift(analysisRecord);
              
              // Keep only last 50 analyses
              const trimmedHistory = history.slice(0, 50);
              
              // Save back to localStorage
              localStorage.setItem('analysis_history', JSON.stringify(trimmedHistory));
              
              console.log('Saved analysis to history:', analysisRecord);
              
              // TODO: Also save to backend database
              // fetch('/api/user/analyses', {
              //   method: 'POST',
              //   headers: { 'Content-Type': 'application/json' },
              //   body: JSON.stringify(analysisRecord)
              // });
              
            } catch (error) {
              console.error('Error saving analysis to history:', error);
            }
          };
          
          const PropertyDocumentsStep = () => {
            const [address, setAddress] = useState('');
            const [price, setPrice] = useState('');
            const [disclosureText, setDisclosureText] = useState('');
            const [inspectionText, setInspectionText] = useState('');
            
            // PARALLEL UPLOAD STATES - Each document uploads independently
            const [uploadingDisclosure, setUploadingDisclosure] = useState(false);
            const [uploadingInspection, setUploadingInspection] = useState(false);
            const [disclosureProgress, setDisclosureProgress] = useState({ current: 0, total: 0, message: '' });
            const [inspectionProgress, setInspectionProgress] = useState({ current: 0, total: 0, message: '' });
            const [disclosurePollInterval, setDisclosurePollInterval] = useState(null);
            const [inspectionPollInterval, setInspectionPollInterval] = useState(null);
            
            // Note: analysisProgress is defined in parent OfferWise component
            const [progressInterval, setProgressInterval] = useState(null);
            const [idleCount, setIdleCount] = useState(0); // Track consecutive idle responses
            
            // Cleanup polling ONLY on component unmount (not on state changes!)
            useEffect(() => {
              // Cleanup function when component unmounts
              return () => {
                // Clean up all polling intervals
                // NOTE: We capture the current values when cleanup runs
                // This only runs on unmount, not on every state change
                if (progressInterval) {
                  clearInterval(progressInterval);
                  console.log('🧹 Cleaned up analysis polling interval on unmount');
                }
                if (disclosurePollInterval) {
                  clearInterval(disclosurePollInterval);
                  console.log('🧹 Cleaned up disclosure polling interval on unmount');
                }
                if (inspectionPollInterval) {
                  clearInterval(inspectionPollInterval);
                  console.log('🧹 Cleaned up inspection polling interval on unmount');
                }
              };
            }, []); // ✅ Empty deps array = only run cleanup on unmount!
            
            // Pause/resume polling when page visibility changes (but don't cancel jobs!)
            useEffect(() => {
              const handleVisibilityChange = () => {
                if (document.hidden) {
                  console.log('⏸️ Page hidden - pausing progress polling (jobs will continue)');
                  // Just pause polling, don't cancel jobs
                  // Jobs will continue in background and complete
                  // When user returns, we can resume polling
                } else {
                  console.log('👁️ Page visible - resuming progress polling');
                  // Resume polling for active uploads
                  // Note: Polling will naturally resume on next check
                }
              };
              
              document.addEventListener('visibilitychange', handleVisibilityChange);
              
              return () => {
                document.removeEventListener('visibilitychange', handleVisibilityChange);
              };
            }, [progressInterval, disclosurePollInterval, inspectionPollInterval]);
            
            // Cancel OCR only when user actually closes tab/window (not just switching tabs)
            useEffect(() => {
              const handleBeforeUnload = (e) => {
                if (uploadingDisclosure || uploadingInspection) {
                  console.log('🛑 User closing page - canceling OCR to save costs');
                  // Only cancel if user is actually leaving the site
                  // Note: Switching tabs won't trigger this, only closing window
                  cancelOCRProcessing();
                }
              };
              
              window.addEventListener('beforeunload', handleBeforeUnload);
              
              return () => {
                window.removeEventListener('beforeunload', handleBeforeUnload);
              };
            }, [uploadingDisclosure, uploadingInspection]);
            
            // Function to cancel backend OCR processing
            const cancelOCRProcessing = async () => {
              try {
                await fetch('/api/cancel-ocr', {
                  method: 'POST',
                  credentials: 'include'
                });
                console.log('✅ OCR cancellation signal sent');
              } catch (error) {
                console.error('Failed to send cancellation signal:', error);
              }
            };
            
            // Poll for OCR progress
            const startProgressPolling = () => {
              setIdleCount(0); // Reset idle counter when starting
              console.log('🔄 Starting progress polling...');
              const interval = setInterval(async () => {
                try {
                  const response = await fetch('/api/ocr-progress', {
                    credentials: 'include'  // Include session cookies
                  });
                  if (response.ok) {
                    const data = await response.json();
                    console.log('📊 Progress update:', data);
                    setProgress(data);
                    
                    // Stop polling if we keep getting idle status (no OCR in progress)
                    if (data.status === 'idle' || (data.current === 0 && data.total === 0)) {
                      setIdleCount(prev => {
                        const newCount = prev + 1;
                        // Stop after 5 consecutive idle responses (~5 seconds)
                        if (newCount >= 5) {
                          console.log('⏹️ Stopping polling - received idle status 5 times');
                          stopProgressPolling();
                        }
                        return newCount;
                      });
                    } else {
                      setIdleCount(0); // Reset counter if we get actual progress
                    }
                  }
                } catch (error) {
                  console.error('Progress polling error:', error);
                  // Stop polling on persistent errors
                  setIdleCount(prev => {
                    const newCount = prev + 1;
                    if (newCount >= 3) {
                      console.log('⏹️ Stopping polling - too many errors');
                      stopProgressPolling();
                    }
                    return newCount;
                  });
                }
              }, 1000); // Poll every second
              
              setProgressInterval(interval);
            };
            
            const stopProgressPolling = () => {
              if (progressInterval) {
                clearInterval(progressInterval);
                setProgressInterval(null);
              }
              setProgress({ current: 0, total: 0, message: '' });
              setIdleCount(0); // Reset idle counter
            };
            
            const handleFileUpload = async (file, type) => {
              console.log(`🚀 [${type}] Starting upload:`, file.name);
              
              // Set uploading state for this specific document
              if (type === 'disclosure') {
                setUploadingDisclosure(true);
                setDisclosureProgress({ current: 0, total: 100, message: 'Preparing upload...' });
              } else {
                setUploadingInspection(true);
                setInspectionProgress({ current: 0, total: 100, message: 'Preparing upload...' });
              }
              
              setError('');
              
              try {
                // Check file size (100MB limit)
                const maxSize = 100 * 1024 * 1024;
                if (file.size > maxSize) {
                  throw new Error(`File too large. Maximum file size is 100 MB. Your file is ${(file.size / 1024 / 1024).toFixed(1)} MB.`);
                }
                
                // Show OCR warning for larger files (likely scanned)
                if (file.size > 2 * 1024 * 1024) {
                  console.log('⏱️ Larger file detected - OCR processing may take 2-4 minutes if this is a scanned PDF');
                }
                
                // Convert to base64 with progress indicator
                console.log('📝 Converting to base64...');
                if (type === 'disclosure') {
                  setDisclosureProgress({ current: 10, total: 100, message: 'Converting file to upload format...' });
                } else {
                  setInspectionProgress({ current: 10, total: 100, message: 'Converting file to upload format...' });
                }
                
                const base64 = await new Promise((resolve, reject) => {
                  const reader = new FileReader();
                  reader.onload = () => resolve(reader.result);
                  reader.onerror = reject;
                  reader.readAsDataURL(file);
                });
                
                console.log('✅ Base64 conversion complete');
                
                console.log('📤 Uploading to /api/upload-pdf...');
                if (type === 'disclosure') {
                  setDisclosureProgress({ current: 20, total: 100, message: 'Uploading to server...' });
                } else {
                  setInspectionProgress({ current: 20, total: 100, message: 'Uploading to server...' });
                }
                
                // Upload and get job_id (returns immediately!)
                const uploadResponse = await fetch('/api/upload-pdf', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  credentials: 'include',
                  body: JSON.stringify({ 
                    pdf_base64: base64,
                    filename: file.name
                  })
                });
                
                console.log(`📥 Upload response: ${uploadResponse.status} ${uploadResponse.statusText}`);
                
                if (!uploadResponse.ok) {
                  const error = await uploadResponse.json().catch(() => ({ 
                    error: 'Upload failed' 
                  }));
                  throw new Error(error.error || 'Upload failed');
                }
                
                const uploadData = await uploadResponse.json();
                console.log('📦 Upload response data:', uploadData);
                
                // Check if async mode (new system)
                if (uploadData.job_id) {
                  console.log(`✅ ASYNC MODE DETECTED!`);
                  console.log(`📋 Job ID: ${uploadData.job_id}`);
                  console.log(`🔄 Starting to poll /api/jobs/${uploadData.job_id}`);
                  
                  if (type === 'disclosure') {
                    setDisclosureProgress({ current: 30, total: 100, message: 'Upload complete! Processing document...' });
                  } else {
                    setInspectionProgress({ current: 30, total: 100, message: 'Upload complete! Processing document...' });
                  }
                  
                  let pollCount = 0;
                  
                  // Poll for job completion
                  let pollFailureCount = 0; // Track consecutive failures
                  const MAX_POLL_FAILURES = 5; // Stop after 5 consecutive failures
                  
                  const pollInterval = setInterval(async () => {
                    pollCount++;
                    try {
                      console.log(`[${type} Poll #${pollCount}] Fetching job status...`);
                      const jobResponse = await fetch(`/api/jobs/${uploadData.job_id}`, {
                        credentials: 'include'
                      });
                      
                      if (!jobResponse.ok) {
                        pollFailureCount++;
                        console.error(`❌ Job status request failed: ${jobResponse.status} ${jobResponse.statusText}`);
                        console.error(`   Failure count: ${pollFailureCount}/${MAX_POLL_FAILURES}`);
                        
                        // Stop polling after repeated failures
                        if (pollFailureCount >= MAX_POLL_FAILURES) {
                          clearInterval(pollInterval);
                          console.error(`❌ [${type}] Too many polling failures (${pollFailureCount}). Stopping.`);
                          throw new Error(`Server error: ${jobResponse.status}. Please refresh and try again.`);
                        }
                        return;
                      }
                      
                      // Reset failure count on success
                      pollFailureCount = 0;
                      
                      const job = await jobResponse.json();
                      console.log(`[${type} Poll #${pollCount}] Status: ${job.status}, Progress: ${job.progress}/${job.total}, Message: ${job.message}`);
                      
                      // Update progress (scale from 30-100% based on job progress)
                      if (job.status === 'processing' || job.status === 'queued') {
                        const jobProgress = job.total > 0 ? (job.progress / job.total) : 0;
                        const scaledProgress = 30 + (jobProgress * 70); // 30% already used for upload, 70% for processing
                        
                        if (type === 'disclosure') {
                          setDisclosureProgress({ 
                            current: Math.round(scaledProgress), 
                            total: 100, 
                            message: job.message || `Processing page ${job.progress} of ${job.total}...` 
                          });
                        } else {
                          setInspectionProgress({ 
                            current: Math.round(scaledProgress), 
                            total: 100, 
                            message: job.message || `Processing page ${job.progress} of ${job.total}...` 
                          });
                        }
                      }
                      
                      // Handle completion
                      if (job.status === 'complete') {
                        clearInterval(pollInterval);
                        console.log(`✅ [${type}] JOB COMPLETE!`);
                        console.log(`📄 Pages: ${job.result.pages}`);
                        console.log(`📝 Characters: ${job.result.chars}`);
                        console.log(`⏱️ Duration: ${job.duration_seconds}s`);
                        
                        // Show 100% completion - KEEP IT VISIBLE!
                        if (type === 'disclosure') {
                          console.log(`✅ Disclosure complete: ${job.result.pages} pages, ${job.duration_seconds}s`);
                          setDisclosureText(job.result.text);
                          setUploadingDisclosure(false); // Enable button immediately!
                          // Keep progress at 100% to show completion
                          setDisclosureProgress({ 
                            current: 100, 
                            total: 100, 
                            message: `✅ Complete! ${job.result.pages} pages processed in ${job.duration_seconds}s` 
                          });
                          setDisclosurePollInterval(null);
                        } else {
                          console.log(`✅ Inspection complete: ${job.result.pages} pages, ${job.duration_seconds}s`);
                          setInspectionText(job.result.text);
                          setUploadingInspection(false); // Enable button immediately!
                          // Keep progress at 100% to show completion
                          setInspectionProgress({ 
                            current: 100, 
                            total: 100, 
                            message: `✅ Complete! ${job.result.pages} pages processed in ${job.duration_seconds}s` 
                          });
                          setInspectionPollInterval(null);
                        }
                        
                        console.log(`🎉 [${type}] Upload complete!`);
                      }
                      
                      // Handle failure
                      if (job.status === 'failed') {
                        clearInterval(pollInterval);
                        console.error(`❌ [${type}] JOB FAILED: ${job.error}`);
                        throw new Error(job.error || 'Processing failed');
                      }
                      
                    } catch (pollError) {
                      pollFailureCount++;
                      console.error(`❌ [${type}] Polling error on attempt #${pollCount}:`, pollError);
                      
                      // Stop polling after repeated errors
                      if (pollFailureCount >= MAX_POLL_FAILURES) {
                        clearInterval(pollInterval);
                        console.error(`❌ [${type}] Too many polling errors (${pollFailureCount}). Stopping.`);
                        
                        if (type === 'disclosure') {
                          setUploadingDisclosure(false);
                          setDisclosureProgress({ current: 0, total: 0, message: '' });
                          setDisclosurePollInterval(null);
                        } else {
                          setUploadingInspection(false);
                          setInspectionProgress({ current: 0, total: 0, message: '' });
                          setInspectionPollInterval(null);
                        }
                        
                        alert(`❌ Processing failed after ${pollCount} attempts.\n\n${pollError.message}\n\nPlease refresh the page and try again.`);
                      }
                      // Continue polling for temporary network errors
                    }
                  }, 1000); // Poll every second
                  
                  // Store poll interval for this document
                  if (type === 'disclosure') {
                    setDisclosurePollInterval(pollInterval);
                  } else {
                    setInspectionPollInterval(pollInterval);
                  }

            textAlign: 'center',
            padding: '16px',
            color: '#666'
          },
          summary: {
            padding: '16px',
            backgroundColor: '#f5f5f5',
            borderRadius: '4px',
            marginBottom: '16px'
          },
          resultBox: {
            padding: '20px',
            backgroundColor: '#f9f9f9',
            borderRadius: '4px'
          },
          warning: {
            padding: '12px',
            backgroundColor: '#fff3cd',
            borderRadius: '4px',
            marginTop: '16px'
          },
          recommendation: {
            padding: '16px',
            backgroundColor: '#d1ecf1',
            borderRadius: '4px',
            marginTop: '16px'
          }
        };
        
        // Error Boundary Component
        class ErrorBoundary extends React.Component {
          constructor(props) {
            super(props);
            this.state = { hasError: false, error: null, errorInfo: null };
          }
          
          static getDerivedStateFromError(error) {
            return { hasError: true };
          }
          
          componentDidCatch(error, errorInfo) {
            console.error('React Error Boundary caught:', error, errorInfo);
            this.setState({ error, errorInfo });
          }
          
          render() {
            if (this.state.hasError) {
              return (
                <div style={{
                  maxWidth: '600px',
                  margin: '40px auto',
                  padding: '20px',
                  fontFamily: 'system-ui, sans-serif'
                }}>
                  <h1 style={{color: '#d32f2f'}}>Something went wrong</h1>
                  <p>The app encountered an error. Please refresh the page and try again.</p>
                  <details style={{marginTop: '20px', fontSize: '14px'}}>
                    <summary style={{cursor: 'pointer'}}>Error Details</summary>
                    <pre style={{
                      backgroundColor: '#f5f5f5',
                      padding: '12px',
                      borderRadius: '4px',
                      overflow: 'auto',
                      fontSize: '12px',
                      marginTop: '12px'
                    }}>
                      {this.state.error && this.state.error.toString()}
                      {'\n\n'}
                      {this.state.errorInfo && this.state.errorInfo.componentStack}
                    </pre>
                  </details>
                  <button
                    onClick={() => window.location.reload()}
                    style={{
                      marginTop: '20px',
                      padding: '12px 24px',
                      backgroundColor: '#000',
                      color: '#fff',
                      border: 'none',
                      borderRadius: '4px',
                      cursor: 'pointer',
                      fontSize: '16px'
                    }}
                  >
                    Refresh Page
                  </button>
                </div>
              );
            }
            
            return this.props.children;
          }
        }
        
        // Global error handlers
        window.addEventListener('error', (event) => {
          console.error('Global error:', event.error);
        });
        
        window.addEventListener('unhandledrejection', (event) => {
          console.error('Unhandled promise rejection:', event.reason);
        });
        
        // Render with error boundary
        console.log('Rendering OfferWise app...');
        ReactDOM.render(
          <ErrorBoundary>
            <OfferWise />
          </ErrorBoundary>,
          document.getElementById('root')
        );
        console.log('App rendered successfully');
    </script>
