<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - OfferWise AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 440px;
            width: 100%;
            padding: 48px 40px;
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 {
            font-size: 2rem; font-weight: 800;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }
        .logo p { color: #94a3b8; font-size: 1rem; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; color: #cbd5e1;
            font-size: 0.8125rem; font-weight: 600; margin-bottom: 6px;
        }
        .form-group input {
            width: 100%; padding: 14px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; color: #e2e8f0;
            font-size: 1rem; outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: rgba(59, 130, 246, 0.5); }
        .form-group input::placeholder { color: #64748b; }
        .submit-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s; margin-top: 8px;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .form-error {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5; padding: 12px 16px; border-radius: 10px;
            font-size: 0.8125rem; margin-bottom: 16px; display: none;
        }
        .form-success {
            background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac; padding: 12px 16px; border-radius: 10px;
            font-size: 0.8125rem; margin-bottom: 16px; display: none;
        }
        .password-requirements { color: #64748b; font-size: 0.75rem; margin-top: 4px; }
        .back-link { text-align: center; margin-top: 28px; }
        .back-link a { color: #60a5fa; text-decoration: none; font-weight: 600; font-size: 0.875rem; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>OfferWise AI</h1>
            <p>Set your new password</p>
        </div>

        <div id="formError" class="form-error"></div>
        <div id="formSuccess" class="form-success"></div>

        <div id="resetForm">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password" autocomplete="new-password">
                <div class="password-requirements">At least 8 characters</div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" autocomplete="new-password">
            </div>
            <button class="submit-btn" onclick="handleReset()" id="resetBtn">Reset Password</button>
        </div>

        <div class="back-link">
            <a href="/login">&larr; Back to sign in</a>
        </div>
    </div>

    <script>
        function getToken() {
            var parts = window.location.pathname.split('/');
            return parts[parts.length - 1];
        }

        function showError(msg) {
            var el = document.getElementById('formError');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('formSuccess').style.display = 'none';
        }
        function showSuccess(msg) {
            var el = document.getElementById('formSuccess');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('formError').style.display = 'none';
        }

        async function handleReset() {
            var btn = document.getElementById('resetBtn');
            var password = document.getElementById('newPassword').value;
            var confirm = document.getElementById('confirmPassword').value;

            if (!password || password.length < 8) {
                showError('Password must be at least 8 characters.');
                return;
            }
            if (password !== confirm) {
                showError('Passwords do not match.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                var token = getToken();
                var res = await fetch('/auth/reset-password/' + token, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });
                var data = await res.json();
                if (data.success) {
                    showSuccess('Password reset successfully! Redirecting...');
                    document.getElementById('resetForm').style.display = 'none';
                    setTimeout(function() {
                        window.location.href = data.redirect || '/settings?tab=analyses';
                    }, 1500);
                } else {
                    showError(data.error || 'Reset failed.');
                }
            } catch (err) {
                showError('Something went wrong. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleReset();
        });
    </script>
<script src="/static/js/compliance.js"></script>
</body>
</html>
