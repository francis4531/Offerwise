<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Request access — OfferWise</title>
<meta name="description" content="Request access to OfferWise's investor materials.">
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1220; --bg2:#111827; --bg3:#1f2937;
    --line:#1f2937; --line2:#374151;
    --txt:#f3f4f6; --body:#cbd5e1; --gray:#9ca3af; --dim:#6b7280;
    --accent:#f97316; --gold:#f59e0b; --green:#22c55e; --red:#ef4444;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;}
  a{color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(245,158,11,.3);}
  a:hover{color:var(--accent);border-bottom-color:var(--accent);}

  .topbar{padding:20px 22px;border-bottom:1px solid var(--line);}
  .brand{font-weight:800;letter-spacing:-.01em;font-size:15px;}
  .brand a{color:var(--txt);border:0;}
  .brand .ai{color:var(--accent);}

  .wrap{max-width:560px;margin:60px auto;padding:0 22px;flex:1;width:100%;}
  .eyebrow{font-size:.7rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
  h1{font-size:clamp(1.7rem,4vw,2.4rem);font-weight:800;line-height:1.1;letter-spacing:-.02em;margin:0 0 16px;}
  h1 span{color:var(--accent);}
  .sub{font-size:1rem;color:var(--body);line-height:1.7;margin:0 0 28px;}

  .what-youll-see{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:18px 20px;margin-bottom:28px;}
  .what-youll-see h3{font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);margin:0 0 12px;}
  .what-youll-see ul{margin:0;padding:0;list-style:none;}
  .what-youll-see li{font-size:.88rem;color:var(--body);padding:5px 0;display:flex;gap:10px;align-items:flex-start;}
  .what-youll-see li::before{content:"›";color:var(--accent);font-weight:700;}

  form{display:grid;gap:18px;}
  .field label{display:block;font-size:.78rem;color:var(--gray);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;}
  .field input,.field textarea{width:100%;background:var(--bg2);border:1px solid var(--line2);color:var(--txt);font-family:inherit;font-size:.95rem;padding:11px 14px;border-radius:6px;outline:none;transition:border-color .15s;}
  .field input:focus,.field textarea:focus{border-color:var(--accent);}
  .field textarea{min-height:90px;resize:vertical;}
  .field .opt{color:var(--dim);font-weight:500;text-transform:none;letter-spacing:0;font-size:.7rem;margin-left:6px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:520px){.field-row{grid-template-columns:1fr;}}

  /* Honeypot — hidden from humans, visible to bots */
  .hp{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;}

  .submit-btn{background:linear-gradient(90deg,var(--accent),var(--gold));color:white;border:0;padding:13px 28px;border-radius:6px;font-weight:700;font-size:1rem;cursor:pointer;font-family:inherit;letter-spacing:-.01em;margin-top:6px;}
  .submit-btn:hover{background:linear-gradient(90deg,#ea580c,#d97706);}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed;}

  .privacy{color:var(--dim);font-size:.78rem;line-height:1.6;margin-top:8px;}

  /* Server-side messages */
  .msg{padding:14px 18px;border-radius:8px;margin-bottom:24px;font-size:.92rem;line-height:1.55;}
  .msg.ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);color:#86efac;}
  .msg.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
  .msg.info{background:rgba(252,211,77,.06);border:1px solid rgba(252,211,77,.25);color:#fde68a;}
  .msg strong{color:var(--txt);}

  /* Submitted state */
  .submitted{text-align:center;padding:24px 0;}
  .submitted .ico{width:56px;height:56px;border-radius:50%;background:rgba(34,197,94,.12);border:1.5px solid var(--green);display:inline-flex;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:20px;color:var(--green);}
  .submitted h2{font-size:1.4rem;font-weight:700;margin:0 0 12px;letter-spacing:-.01em;}
  .submitted p{color:var(--body);font-size:.95rem;line-height:1.65;margin:0 0 12px;}
  .submitted .alt-links{margin-top:32px;padding-top:24px;border-top:1px solid var(--line);font-size:.85rem;color:var(--gray);}
  .submitted .alt-links a{margin:0 8px;color:var(--gray);border:0;}
  .submitted .alt-links a:hover{color:var(--accent);}

  .footer{padding:24px 22px;text-align:center;color:var(--dim);font-size:.78rem;border-top:1px solid var(--line);margin-top:auto;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><a href="/">OfferWise<span class="ai">™</span></a></div>
</div>

<div class="wrap">
  {{MESSAGE_SLOT}}
  {{FORM_SLOT}}
</div>

<div class="footer">
  &copy; 2026 OfferWise AI &middot; <a href="/about" style="color:var(--gray);border:0;">About</a> &middot; <a href="/comparison" style="color:var(--gray);border:0;">vs. LLMs</a> &middot; <a href="mailto:hello@getofferwise.ai" style="color:var(--gray);border:0;">Contact</a>
</div>

</body>
</html>
