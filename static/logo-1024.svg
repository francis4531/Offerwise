<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bgGrad)"/>

  <!-- Icon centered upper portion -->
  <g transform="translate(512, 380) scale(0.75)">
    <path d="M 0 -280 L -260 -60 L -260 200 L 260 200 L 260 -60 Z"
          fill="none" stroke="url(#blueGrad)" stroke-width="42" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="-260" y1="-60" x2="260" y2="-60" stroke="url(#blueGrad)" stroke-width="42" stroke-linecap="round"/>

    <g transform="translate(140, 80)">
      <circle cx="0" cy="0" r="110" fill="rgba(15,23,42,0.85)" stroke="url(#greenGrad)" stroke-width="38"/>
      <line x1="78" y1="78" x2="170" y2="170" stroke="url(#greenGrad)" stroke-width="40" stroke-linecap="round"/>
    </g>
    <g transform="translate(140, 80)">
      <path d="M -40 8 L -10 38 L 50 -32"
            fill="none" stroke="#4ade80" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <rect x="-190" y="-10" width="100" height="100" rx="10" fill="url(#blueGrad)" opacity="0.2"/>
    <line x1="-140" y1="-10" x2="-140" y2="90" stroke="#3b82f6" stroke-width="5" opacity="0.4"/>
    <line x1="-190" y1="40" x2="-90" y2="40" stroke="#3b82f6" stroke-width="5" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="512" y="800" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="110" font-weight="800" fill="#f1f5f9" letter-spacing="-2">
    Offer<tspan fill="url(#blueGrad)">Wise</tspan>
  </text>

  <!-- Tagline -->
  <text x="512" y="870" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="36" font-weight="500" fill="#64748b" letter-spacing="6">
    AI-POWERED ANALYSIS
  </text>
</svg>
