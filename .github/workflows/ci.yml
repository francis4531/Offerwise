name: OfferWise CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # Install test-critical packages first (fast)
          pip install flask flask-login flask-sqlalchemy flask-cors flask-limiter pytest
          # Install anthropic explicitly before full requirements (avoids timeout)
          pip install anthropic==0.49.0
          # Install remaining requirements, skipping heavy ML deps (torch, sentence-transformers)
          # ML inference is optional and guarded by try/except — not needed for CI
          grep -v "sentence-transformers\|xgboost" requirements.txt > requirements_ci.txt
          pip install -r requirements_ci.txt --quiet || true
          pip install ruff

      - name: Syntax check ALL Python modules
        run: |
          python -m py_compile app.py
          python -m py_compile blueprint_helpers.py
          python -m py_compile testing_routes.py
          python -m py_compile bug_routes.py
          python -m py_compile docrepo_routes.py
          python -m py_compile survey_routes.py
          python -m py_compile waitlist_routes.py
          python -m py_compile sharing_routes.py
          python -m py_compile payment_routes.py
          python -m py_compile offerwise_intelligence.py
          python -m py_compile document_parser.py
          python -m py_compile risk_check_engine.py
          python -m py_compile ai_output_validator.py
          python -m py_compile integrity_tests.py
          python -m py_compile nearby_listings.py
          python -m py_compile state_disclosures.py
          python -m py_compile drip_campaign.py
          python -m py_compile market_intelligence.py
          python -m py_compile google_ads_sync.py
          python -m py_compile property_research_agent.py
          python -m py_compile models.py
          python -m py_compile ml_inference.py
          python -m py_compile ml_data_collector.py

      - name: Lint critical files
        run: |
          ruff check --select E9,F63,F7,F82 \
            app.py \
            blueprint_helpers.py \
            testing_routes.py \
            bug_routes.py \
            docrepo_routes.py \
            survey_routes.py \
            waitlist_routes.py \
            sharing_routes.py \
            payment_routes.py \
            offerwise_intelligence.py \
            document_parser.py \
            risk_check_engine.py \
            ai_output_validator.py \
            integrity_tests.py \
            nearby_listings.py \
            state_disclosures.py \
            drip_campaign.py \
            market_intelligence.py \
            google_ads_sync.py \
            property_research_agent.py \
            models.py \
            gtm/conversion_intel.py \
            gtm/routes.py

      - name: Run test suite (non-e2e)
        env:
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///test.db
        run: |
          set -o pipefail
          python -m pytest -m "not e2e" -p no:cacheprovider --tb=short 2>&1 | tail -120

      - name: Run e2e suite (isolated DB)
        env:
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///test_e2e.db
        run: |
          set -o pipefail
          python -m pytest -m "e2e" -p no:cacheprovider --tb=short 2>&1 | tail -120

      - name: Run integrity tests
        env:
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///test.db
        run: python run_ci_integrity.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Babel for the JSX compile check
        run: npm install --no-save @babel/core @babel/preset-react

      - name: Frontend guard — Babel pinned + inline JSX compiles
        run: node scripts/check_frontend.js

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          ! grep -rn "api_key\s*=\s*['\"][a-zA-Z0-9]" --include="*.py" \
            --exclude-dir=scripts_archive \
            --exclude-dir=__pycache__ \
            | grep -v "os.environ\|get(\|example\|test\|template\|\.env"

      - name: Check for bare except clauses
        run: |
          count=$(grep -rn "except:$" --include="*.py" \
            --exclude-dir=scripts_archive \
            --exclude-dir=__pycache__ \
            | wc -l)
          if [ "$count" -gt "0" ]; then
            echo "Found $count bare except: clauses in active code"
            grep -rn "except:$" --include="*.py" \
              --exclude-dir=scripts_archive \
              --exclude-dir=__pycache__
            exit 1
          fi
