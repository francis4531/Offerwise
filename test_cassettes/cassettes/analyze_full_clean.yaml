        Pre-Analysis Intelligence Brief\\n**Property:** 456 Clean Disclosure St, Oakland,
        CA\\n**Prepared:** Pre-Disclosure Review | Status: Awaiting Seller Documents\\n\\n---\\n\\n##
        What We Know Before Seeing Seller Documents\\n\\nThe AVM (Automated Valuation
        Model) via RentCast places this property at **$388,000**, but the confidence
        interval is notably wide \u2014 ranging from **$280,000 to $496,000**, a spread
        of **$216,000**. That kind of range typically signals limited comparable sales
        data, unusual property characteristics, or significant condition variability
        in the immediate area. The single comparable surfaced in the dataset \u2014
        **330 13th St, Unit 1A** (a 1,296 sq ft condo, 1 bed/1.5 bath, built 1914,
        sold at $449,000 or **$346/sq ft**) \u2014 suggests the surrounding market
        skews toward older, smaller condo-style units. Notably, that comp sat on market
        for **32 days**, which is slightly elevated for Oakland's core market and
        may indicate softening buyer demand at this price point.\\n\\n## Top 3 Things
        to Verify in the Seller Disclosure\\n\\n1. **Property Type and Unit Configuration:**
        RentCast returned **null values for bedrooms, bathrooms, square footage, property
        type, and year built** \u2014 every structural data field is missing. Before
        any offer is written, the seller disclosure must confirm whether this is a
        condo, TIC, single-family, or multi-unit property, as that determination alone
        could shift valuation by 10\u201320% and dramatically affect financing eligibility.\\n2.
        **Age of Property and Deferred Maintenance History:** With year built unknown
        and the closest comp dating to **1914**, there is a real possibility this
        property carries pre-war construction. The disclosure should be scrutinized
        for roof age, foundation type, plumbing material (galvanized vs. copper),
        and any history of seismic retrofitting \u2014 all high-cost risk items in
        Oakland's older housing stock.\\n3. **HOA Status, Liens, and Assessed Value:**
        The assessed value came back **null**, which is unusual and warrants explanation.
        Buyers should demand a current tax bill, confirm whether any Mello-Roos or
        special assessments apply, and verify there are no outstanding liens or code
        violations on record with the City of Oakland.\\n\\n## Red Flags and Risk
        Factors Affecting Offer Price\\n\\nThe **$216,000 AVM spread** is the single
        biggest red flag in this dataset \u2014 it tells us the model lacks confidence,
        which means a buyer relying on the $388,000 midpoint without independent verification
        is taking on meaningful valuation risk. If the property is closer to the **$280,000
        floor**, an offer at ask would represent an immediate **~$108,000 overpayment
        relative to supportable value**. Additionally, the absence of lot size, square
        footage, and property type data makes it impossible to calculate a price-per-square-foot
        benchmark against the one available comp ($346/sq ft). Until square footage
        is confirmed, no credible price-per-foot analysis can be run, and the offer
        price should be treated as **provisional**.\\n\\n## Critical Data Gaps\\n\\nThis
        brief is operating with significant blind spots. The following data was **not
        retrievable** and must be sourced before finalizing any offer strategy: square
        footage, bedroom/bathroom count, year built, lot size, property type, assessed
        value, and any rental or income history. Additionally, only **one comparable
        transaction** was returned \u2014 an insufficient sample for reliable valuation.
        A full MLS pull, Alameda County Assessor record review, and physical inspection
        are non-negotiable next steps. Do not treat the $388,000 AVM figure as validated
        until structural data gaps are closed.\\n\\n---\\n*This brief reflects pre-disclosure
