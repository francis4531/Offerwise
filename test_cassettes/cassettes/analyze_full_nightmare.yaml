      Patricia Nguyen, ASHI #189234\nCRITICAL FINDINGS SUMMARY\nCRITICAL - FOUNDATION\nSignificant
      structural cracking in foundation. Multiple cracks exceeding 1/4 inch width
      with vertical displacement observed on east and south walls.\nStep-cracking
      pattern suggests differential settling. THIS IS A SAFETY CONCERN. Immediate
      evaluation by licensed structural engineer required.\nEstimated repair: $15,000-$45,000
      depending on remediation method (pier/beam, mudjacking, or complete section
      replacement). NOTE: This type of\ncracking typically develops over years and
      would be visible to property occupants.\nCRITICAL - ROOF\nActive water intrusion
      detected in three locations. Roof is well past useful life with extensive damage:
      missing shingles across south and west slopes,\ndeteriorated flashing at all
      penetrations, visible daylight through roof decking in attic at two locations.
      Active leak staining on attic insulation and ceiling\ndrywall in master bedroom
      and hallway. Mold growth observed on attic decking in two areas (~3 sq ft total).
      Full roof replacement required\nimmediately. Estimated cost: $18,000-$25,000.
      Mold remediation estimated: $3,000-$8,000. NOTE: Multiple layers of roofing
      material suggest\nprevious repairs/patches without addressing underlying issues.\nCRITICAL
      - ELECTRICAL\nFederal Pacific Stab-Lok electrical panel identified. This panel
      type has a documented history of breaker failure and fire risk. Panel does not
      reliably\ntrip under overload conditions. Multiple insurance companies will
      not insure homes with this panel. Immediate replacement required. Additionally:\nKnob-and-tube
      wiring discovered in attic section, suggesting unpermitted addition. Estimated
      panel replacement: $2,500-$4,000. Wiring remediation:\n$5,000-$12,000. NOTE:
      Federal Pacific panels were common in 1960s-1980s construction but this home
      is listed as built 2002 - suggesting the\ngarage conversion/addition used the
      original panel from a prior structure.\nMAJOR - PLUMBING\nMain sewer line shows
      signs of root intrusion. Camera inspection recommended. Evidence of previous
      plumbing leak under kitchen sink with water\ndamage to cabinet floor and subfloor.
      Staining pattern suggests longstanding intermittent leak. Hot water recirculation
      pump non-functional. Bathroom\n2 has low water pressure - may indicate galvanized
      supply lines in that section. Estimated repairs: Sewer line $4,000-$8,000 if
      root intrusion\nconfirmed. Kitchen subfloor repair $2,000-$4,000.\nMAJOR - UNPERMITTED
      ADDITION\nConverted garage/bonus room shows clear signs of non-professional
      construction: Drywall seams poorly taped, electrical outlets with reversed\npolarity,
      no fire separation between converted space and main structure, single-pane windows
      where dual-pane required. No permits found on file with\nCity of Sunnyvale for
      this conversion. This may affect property value, insurance, and square footage
      calculations. Cost to bring to code:\n$15,000-$30,000.\nMAJOR - DRAINAGE\nNegative
