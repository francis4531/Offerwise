        requirements for older homes. If this property was built pre-1980, mandatory
        retrofit compliance and disclosure obligations apply and must be confirmed.\\n\\n---\\n\\n##
        Red Flags & Risk Factors Affecting Offer Price\\n\\nThe **street name alone
