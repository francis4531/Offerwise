- id: plumbing.thermal_expansion_protection
  question: Does the water heater have thermal-expansion protection (expansion tank) where required?
  description: Presence/absence of thermal-expansion control (expansion tank or equivalent) on the water heater. Required on closed plumbing systems (PRV / check valve / backflow preventer present); absence over-pressurizes the system and stresses the TPR valve. Older units may predate the requirement (grandfathered). Pilot-surfaced candidate item.
  group: plumbing
  answer_type: enum
  importance: supporting
  cost_impact: indirect
  compliance_basis:
    basis: best_practice
    citation: Code-required on closed systems under UPC/IPC (exact section pending Q-5.8 verification); ASHI/NACHI SoP. Older installs may be grandfathered.
