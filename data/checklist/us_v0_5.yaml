# OfferWise Internal Property Checklist — United States
# =====================================================================
# Scope:    NATIONAL (entire USA). Jurisdiction-agnostic national base + stacked
#           state and municipal overlays. NOT a California product; CA and SFH are
#           the deepest-coverage slice today, not the boundary (Commitment 2.5).
# Version:  v0.5 (CONSOLIDATED)
# Date:     2026-05-29
# Status:   Consolidated master. v0.5 folds in three evidence-backed refinements
#           surfaced by the corpus labeling pilot (one read-only NACHI member sample).
#           Supersedes v0.4.
#
#  NAMING:  "CA SFH" is a RESOLVED VIEW, not this asset (national_base + ca_overlay
#           + CA municipal_overlay, composed for one property).
#
# Built to: Reasoning Architecture (current v0.4), Section 3.5 (item anatomy)
#
# Contents: 70 fully-populated items
#             national_base : 56   (incl. 1 added in v0.5)
#             ca_overlay.adds: 14
#           ca_overlay.refines: 3   |  ca_overlay.deprecated: 1
#           municipal_overlay : 3 jurisdictions (Daly City, Portola Valley, San Jose)
#           Compliance basis: 39 legal_requirement, 30 best_practice, 1 offerwise_judgment
#
# Composition (Q-5.9): national_base -> state_overlay -> municipal_overlay; add/refine,
#   no silent delete. Grouping (Q-5.5): groups emerge from the checklist.
#   Citations (Q-5.8): all legal_requirement items verified vs current US/CA code, May 2026
#   (see offerwise_citation_verification_q5_8.yaml). The one v0.5 addition is best_practice.
#
# v0.5 CHANGES (from offerwise_corpus_labeling_pilot.yaml):
#   1. electrical.wiring_material — description sharpened to distinguish benign
#      service-entrance/feeder aluminum from hazardous 120V branch-circuit aluminum.
#   2. electrical.panel_brand_safety — broadened to cover breaker incompatibility
#      (mixed / non-listed breakers), not only known-hazard brands.
#   3. NEW plumbing.thermal_expansion_protection — water-heater expansion control;
#      best_practice (UPC/IPC section pending a Q-5.8 verification pass).
#   Source: read-only NACHI member sample (Lon Henderson #1); NOT ingested (ai-train=no,
#   R9 consent gate). The pilot informed these refinements; the report is not in the corpus.
#
# answer_type: numeric_years | numeric | boolean | enum | freetext | range | dollar_amount
# importance: critical | major | supporting | informational
# cost_impact: yes | indirect | no
# disclosure_obligation_state: required | conditional | not_required
# severity_when_negative: minor | moderate | major | critical
# unanswered_implication: seller_should_disclose | specialist_required | unanswerable_from_documents | minor
# =====================================================================

VERSION: "v0.5"
