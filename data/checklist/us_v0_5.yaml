- id: electrical.wiring_material
  question: Is the 120V branch-circuit wiring copper, aluminum, or mixed?
  description: 'Presence of aluminum BRANCH-CIRCUIT (120V) wiring — a fire-safety concern at connections in older homes. Service-entrance/feeder aluminum is normal and is NOT this item''s concern; only branch-circuit aluminum is flagged. The two must not be conflated (pilot-surfaced precision split: a real report noted both, benign service-entrance + hazard branch).'
  group: electrical
  answer_type: enum
  importance: major
  cost_impact: indirect
  compliance_basis:
