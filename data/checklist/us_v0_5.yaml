  answer_type: numeric
  importance: supporting
  cost_impact: indirect
  compliance_basis:
    basis: best_practice
    citation: ASHI/NACHI SoP
  disclosure_obligation_state: not_required
  severity_when_negative: minor
  unanswered_implication: unanswerable_from_documents
