- id: electrical.panel_brand_safety
  question: Does the panel have a safety concern — a known-hazard brand (FPE Stab-Lok, Zinsco) OR breaker incompatibility (mixed / non-listed breakers not intended for the panel)?
  description: 'Panel safety on two fronts: (a) known failure-prone brands with documented failure-to-trip / fire history affecting safety and insurability; and (b) mixed-brand or non-listed breakers not intended for the panel — a sibling safety concern surfaced in pilot labeling. Both affect safety and may affect insurability.'
  group: electrical
  answer_type: enum
  importance: critical
  cost_impact: yes
  compliance_basis:
    basis: best_practice
    reasoning: 'SILENT-HAZARD class: documented fire/insurability risk but reads ''functional'', so structurally invisible to TDS/SPQ. OfferWise-critical (Commitment 2.2 omission case).'
  disclosure_obligation_state: not_required
  severity_when_negative: critical
  unanswered_implication: specialist_required
  applicability:
    jurisdictions:
    - '*'
    property_types:
    - SFH
    - condo
    - townhouse
  related_items:
  - electrical.wiring_material
  - electrical.service_capacity_amps
- id: electrical.service_capacity_amps
