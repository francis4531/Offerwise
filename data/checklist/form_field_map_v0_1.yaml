VERSION: v0.1
purpose: Curated deterministic form-field / structured-report map (Q-5.2 deterministic path). Maps standardized form + report locations to checklist item ids with value semantics. DERIVED from the Q-5.8 verified citations + the Q-5.7 source audit — not invented. Field-level extraction from real C.A.R. form PDFs requires form specimens (see gaps).
source_forms:
- TDS
- SPQ
- NHD_report
- title_report
- CLUE
coverage:
  deterministic_items: 47
  locator_cited: 21
  locator_inferred: 16
  needs_form_specimen: 10
gaps: locator_confidence=needs_specimen items have a known form but no field-level locator yet; resolving them needs a real C.A.R. form specimen to read (spec-first). Until then the deterministic mapper can consume (form, locator, value) tuples but the parser that PRODUCES field-identified inputs from a real PDF is deferred (Phase 1 follow-on).
